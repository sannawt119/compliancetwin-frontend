<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ComplianceTwin</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0b0c;
      color: #eee;
      padding: 20px;
    }

    .chat {
      max-width: 900px;
      margin: auto;
    }

    .msg {
      margin-bottom: 16px;
    }

    .user {
      text-align: right;
      color: #aaa;
    }

    .ai {
      background: #151517;
      border: 1px solid #2a2a2e;
      padding: 14px;
      border-radius: 10px;
    }

    .section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2e;
    }

    .title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #9da3ff;
    }

    .small {
      font-size: 12px;
      color: #aaa;
    }

    .law-card {
      background: #101014;
      border: 1px solid #2a2a2e;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      background: #151517;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Ask a compliance question..." />

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

const API = "http://localhost:8000/chat";

input.addEventListener("keypress", async (e) => {
  if (e.key !== "Enter") return;

  const q = input.value.trim();
  if (!q) return;

  addUser(q);
  input.value = "";

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      session_id: "demo",
      question: q
    })
  });

  const data = await res.json();
  renderResponse(data);
});


function addUser(text){
  chat.innerHTML += `<div class="msg user">${escape(text)}</div>`;
}


// =============================
// MAIN RENDER
// =============================
function renderResponse(data){

  if(data.type === "clarification"){
    renderClarification(data);
    return;
  }

  if(data.type === "explanation"){
    renderExplanation(data);
    return;
  }

  if(data.type === "procedure"){
    renderProcedure(data);
    return;
  }

  renderApplicability(data);
}


// =============================
// APPLICABILITY (CORE)
// =============================
function renderApplicability(data){

  const n = data.narrative || {};
  const sym = data.symbolic || {};
  const results = sym.results || {};

  let html = `<div class="msg ai">`;

  // =========================
  // WHY (PRIMARY)
  // =========================
  html += `<div class="title">Why this applies</div>`;

  for(const iid in results){
    const r = results[iid];
    const trace = r.trace || [];

    html += `<div class="section">`;
    html += `<div class="small"><strong>${iid}</strong></div>`;

    trace.forEach(t => {
      if(t.result === "pass" && t.evidence){
        html += `<div class="small">• ${escape(t.evidence)}</div>`;
      }
    });

    html += `</div>`;
  }

  // =========================
  // VERDICT
  // =========================
  html += `
    <div class="section">
      <div class="title">Conclusion</div>
      <div>${escape(n.verdict_line || "")}</div>
    </div>
  `;

  // =========================
  // DETAILED ANALYSIS
  // =========================
  if(n.full_analysis){
    html += `
      <div class="section">
        <div class="title">Detailed analysis</div>
        <div class="small">${escape(n.full_analysis)}</div>
      </div>
    `;
  }

  // =========================
  // LEGAL BASIS
  // =========================
  if(n.legal_basis_cards){
    html += `<div class="section"><div class="title">Legal basis</div>`;

    n.legal_basis_cards.forEach(c => {
      html += `
        <div class="law-card">
          <div><strong>${escape(c.instrument_short)}</strong></div>
          <div class="small">${escape(c.articles)}</div>
          <div class="small">${escape(c.description || "")}</div>
        </div>
      `;
    });

    html += `</div>`;
  }

  // =========================
  // TRACE SUMMARY
  // =========================
  html += `<div class="section"><div class="title">How this was determined</div>`;

  for(const iid in results){
    const s = results[iid].scope || {};

    html += `
      <div class="small">
        <strong>${iid}</strong>:
        Temporal ${s.temporal || "-"},
        Territorial ${s.territorial || "-"},
        Material ${s.material || "-"}
      </div>
    `;
  }

  html += `</div>`;

  html += `</div>`;

  chat.innerHTML += html;
}


// =============================
// CLARIFICATION
// =============================
function renderClarification(data){

  let html = `<div class="msg ai">`;
  html += `<div class="title">Missing information</div>`;

  (data.questions || []).forEach(q => {
    html += `<div class="small">→ ${escape(q)}</div>`;
  });

  html += `</div>`;
  chat.innerHTML += html;
}


// =============================
// EXPLANATION
// =============================
function renderExplanation(data){
  chat.innerHTML += `
    <div class="msg ai">
      <div>${escape(data.text)}</div>
    </div>
  `;
}


// =============================
// PROCEDURE
// =============================
function renderProcedure(data){
  chat.innerHTML += `
    <div class="msg ai">
      <div>${escape(data.text)}</div>
    </div>
  `;
}


// =============================
// UTIL
// =============================
function escape(str){
  return str
    ?.replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;") || "";
}
</script>

</body>
</html>
