
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceTwin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1a2744;--green:#15803d;--teal:#0d9488;
  --amber:#b45309;--red:#dc2626;
  --ai-bg:#f0faf6;--ai-bdr:#b6e4cb;
  --bg:#fff;--bg2:#f7f6f3;--bg3:#f1f0ec;
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --bdr:#e5e7eb;--bdr2:#d1d5db;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  height:100vh;display:flex;overflow:hidden;font-size:13px;color:var(--txt);
  background:var(--bg);}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sb{width:220px;min-width:220px;background:var(--bg2);
  border-right:.5px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:12px;border-bottom:.5px solid var(--bdr);
  display:flex;align-items:center;gap:8px;}
.sb-logo-icon{width:24px;height:24px;background:var(--navy);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:9px;font-weight:600;flex-shrink:0;}
.sb-logo-txt{font-size:13px;font-weight:600;color:var(--txt);}
.sb-lbl{font-size:9px;font-weight:600;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.08em;padding:10px 12px 4px;}
.ctx-card{margin:0 8px 6px;padding:8px 10px;border:1.5px solid var(--green);
  border-radius:8px;background:var(--bg);cursor:pointer;}
.ctx-co{font-size:12px;font-weight:600;}
.ctx-mkt{font-size:10px;color:var(--txt2);margin-top:1px;}
.ctx-badge{display:inline-block;margin-top:4px;padding:2px 7px;
  border-radius:20px;background:var(--bg2);border:.5px solid var(--bdr2);
  font-size:9px;color:var(--txt2);}
.sess-list{flex:1;overflow-y:auto;padding:2px 6px;}
.sess-item{padding:6px 8px;border-radius:7px;cursor:pointer;margin-bottom:1px;}
.sess-item:hover,.sess-item.active{background:var(--bg3);}
.sess-title{font-size:11.5px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-sub{font-size:10px;color:var(--txt3);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.new-btn{margin:8px;padding:7px;border:.5px solid var(--bdr2);
  border-radius:7px;background:transparent;font-size:11.5px;
  color:var(--txt2);cursor:pointer;font-family:inherit;text-align:center;}
.new-btn:hover{background:var(--bg);}
.user-foot{padding:8px 12px;border-top:.5px solid var(--bdr);
  display:flex;align-items:center;gap:8px;}
.user-av{width:26px;height:26px;background:var(--navy);border-radius:50%;
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;flex-shrink:0;}
.user-name{font-size:11.5px;font-weight:500;}
.user-role-txt{font-size:9.5px;color:var(--txt3);}

/* ── MAIN ────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mhdr{padding:10px 18px;border-bottom:.5px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhdr-title{font-size:13px;font-weight:600;}
.mhdr-meta{font-size:10px;color:var(--txt3);margin-top:1px;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{padding:4px 10px;border:.5px solid var(--bdr2);border-radius:6px;
  background:var(--bg);font-size:10px;color:var(--txt2);cursor:pointer;font-family:inherit;}
.hdr-btn:hover{background:var(--bg2);}

/* ── MESSAGES ────────────────────────────────────────────── */
#msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

.msg-user{display:flex;justify-content:flex-end;}
.user-bub{max-width:65%;padding:10px 14px;background:var(--navy);color:#fff;
  border-radius:14px 14px 3px 14px;font-size:13px;line-height:1.5;}

.msg-ai{display:flex;gap:8px;max-width:94%;}
.ai-icon{width:26px;height:26px;min-width:26px;background:var(--navy);
  border-radius:7px;color:#fff;font-size:9px;font-weight:600;
  display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0;}
.ai-parts{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}

/* verdict bubble */
.vbub{background:var(--ai-bg);border:1px solid var(--ai-bdr);
  border-radius:3px 12px 12px 12px;padding:11px 14px;font-size:13px;line-height:1.6;}
.v-yes{color:var(--green);}
.v-no{color:var(--red);}
.v-unk{color:var(--amber);}
.v-info{color:var(--navy);}
.expand-row{margin-top:8px;display:flex;align-items:center;gap:8px;}
.expand-btn{padding:3px 8px;border:.5px solid var(--ai-bdr);border-radius:20px;
  background:var(--bg);font-size:10px;color:var(--txt2);cursor:pointer;font-family:inherit;}
.expand-btn:hover{background:var(--ai-bg);}
.full-a{display:none;margin-top:8px;padding-top:8px;
  border-top:.5px solid var(--ai-bdr);font-size:12.5px;line-height:1.65;}
.full-a.open{display:block;}

/* general bubble */
.gen-bub{background:var(--bg);border:.5px solid var(--bdr);
  border-radius:3px 12px 12px 12px;padding:11px 14px;font-size:13px;line-height:1.65;}

/* legal card */
.lc{border:.5px solid var(--bdr);border-radius:10px;overflow:hidden;background:var(--bg);}
.lc-head{padding:6px 11px;border-bottom:.5px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;}
.lc-lbl{font-size:8px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.09em;}
.lc-lex{padding:1px 7px;border:.5px solid var(--teal);border-radius:20px;
  font-size:9px;color:var(--teal);text-decoration:none;}
.lc-lex:hover{background:#f0fdf4;}
.lc-body{padding:7px 11px;}
.lc-arts{font-size:12px;font-weight:600;}
.lc-desc{font-size:10.5px;color:var(--txt2);margin-top:2px;line-height:1.4;}

/* ── REASONING CARD ─────────────────────────────────────── */
.rcard{border:.5px solid var(--bdr);border-radius:10px;background:var(--bg);overflow:hidden;}
.rc-head{display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-bottom:.5px solid var(--bdr);}
.rc-lbl{font-size:8px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;}
.rc-pass{font-size:10px;color:var(--green);font-weight:600;}
.rc-body{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}

/* instrument row inside reasoning card */
.inst-row{display:flex;flex-direction:column;gap:4px;}
.inst-name{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;}
.pills{display:flex;flex-wrap:wrap;gap:3px;}
.pill{padding:2px 7px;border-radius:20px;font-size:10px;display:inline-flex;align-items:center;gap:2px;}
.pill.ok{background:#f0fdf4;border:.5px solid #bbf7d0;color:var(--green);}
.pill.fail{background:#fef2f2;border:.5px solid #fecaca;color:var(--red);}
.pill.unk{background:#fffbeb;border:.5px solid #fde68a;color:var(--amber);}
.pill.future{background:#eff6ff;border:.5px solid #bfdbfe;color:#1d4ed8;}
.pill.excl{font-size:9.5px;color:var(--txt3);background:none;border:.5px solid var(--bdr);padding:2px 7px;}

/* trace panel */
.trace-toggle{font-size:9.5px;color:var(--teal);cursor:pointer;
  padding:2px 0;display:inline-block;}
.trace-toggle:hover{text-decoration:underline;}
.trace-panel{display:none;margin-top:4px;padding:8px 10px;
  background:var(--bg2);border-radius:7px;font-size:10.5px;line-height:1.6;}
.trace-panel.open{display:block;}
.trace-dim{font-size:9px;font-weight:600;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.07em;margin-top:6px;margin-bottom:2px;}
.trace-dim:first-child{margin-top:0;}
.trace-entry{display:flex;gap:6px;padding:2px 0;border-bottom:.5px solid var(--bdr);line-height:1.5;}
.trace-entry:last-child{border-bottom:none;}
.trace-sym{flex-shrink:0;font-weight:600;width:14px;}
.trace-sym.pass{color:var(--green);}
.trace-sym.fail{color:var(--red);}
.trace-sym.unk{color:var(--amber);}
.trace-sym.future{color:#1d4ed8;}
.trace-ev{color:var(--txt);flex:1;}
.trace-note{font-size:10px;color:var(--teal);margin-top:1px;}
.trace-cite{font-size:9.5px;color:var(--txt3);margin-top:1px;}
.governing-tag{display:inline-block;margin-left:4px;padding:0 5px;
  background:#dbeafe;border-radius:10px;font-size:8.5px;color:#1d4ed8;font-weight:600;}
.additional-tag{display:inline-block;margin-left:4px;padding:0 5px;
  background:#f1f5f9;border-radius:10px;font-size:8.5px;color:var(--txt3);font-weight:600;}

/* risk category badge */
.risk-badge{display:inline-block;padding:1px 6px;border-radius:4px;
  font-size:9px;font-weight:600;background:#eff6ff;color:#1d4ed8;
  border:.5px solid #bfdbfe;margin-left:4px;}

/* company playbook */
.pb-card{border:.5px solid #fde68a;background:#fffbeb;border-radius:10px;padding:8px 10px;}
.pb-lbl{font-size:8px;font-weight:600;color:#92400e;text-transform:uppercase;letter-spacing:.08em;}
.pb-view{font-size:9.5px;color:var(--amber);cursor:pointer;}
.pb-files{font-size:10.5px;color:#78350f;display:flex;flex-direction:column;gap:2px;margin-top:5px;}
.pb-ctx{font-size:10px;color:#92400e;margin-top:4px;line-height:1.4;}

/* follow-up card */
.fq-card{border:.5px solid #fde68a;background:#fffbeb;border-radius:10px;padding:8px 11px;}
.fq-lbl{font-size:8px;font-weight:600;color:#92400e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.fq-q{font-size:11.5px;color:#78350f;margin-bottom:2px;}

/* sources */
.src-toggle{padding:3px 8px;border:.5px solid var(--bdr);border-radius:6px;
  background:var(--bg2);font-size:10px;color:var(--txt2);cursor:pointer;font-family:inherit;margin-top:2px;}
.src-list{display:none;margin-top:6px;padding:8px 10px;
  border:.5px solid var(--bdr);border-radius:8px;background:var(--bg);}
.src-list.open{display:block;}
.src-item{padding:5px 0;border-bottom:.5px solid var(--bdr);font-size:10.5px;}
.src-item:last-child{border-bottom:none;}
.src-title{font-weight:500;color:var(--txt);}
.src-score{color:var(--txt3);margin-left:6px;}
.src-text{color:var(--txt2);margin-top:2px;line-height:1.4;font-size:10px;}

/* loading */
.ldots{display:flex;gap:3px;align-items:center;}
.ld{width:5px;height:5px;background:var(--txt3);border-radius:50%;animation:b 1.1s infinite;}
.ld:nth-child(2){animation-delay:.18s;}.ld:nth-child(3){animation-delay:.36s;}
@keyframes b{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
.ld-status{font-size:10.5px;color:var(--txt3);font-style:italic;margin-left:8px;}

/* actions bar */
#acts{padding:7px 18px;border-top:.5px solid var(--bdr);display:none;flex-wrap:wrap;gap:6px;flex-shrink:0;}
.act{padding:6px 13px;border-radius:20px;font-size:11.5px;cursor:pointer;font-family:inherit;border:none;}
.act.pri{background:var(--navy);color:#fff;}
.act.sec{background:var(--bg);color:var(--txt);border:.5px solid var(--bdr2);}
.act:hover{opacity:.8;}

/* input */
#inbar{padding:8px 18px 12px;border-top:.5px solid var(--bdr);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
#cin{flex:1;padding:9px 12px;border:.5px solid var(--bdr2);border-radius:8px;
  font-size:13px;color:var(--txt);outline:none;resize:none;font-family:inherit;
  line-height:1.4;max-height:100px;overflow-y:auto;background:var(--bg);}
#cin::placeholder{color:var(--txt3);}
#cin:focus{border-color:#9ca3af;}
#sbtn{padding:9px 16px;background:var(--navy);color:#fff;border:none;
  border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;}
#sbtn:disabled{opacity:.4;cursor:not-allowed;}

/* welcome */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:40px 24px;}
.wt{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:6px;}
.ws{font-size:13px;max-width:360px;line-height:1.6;color:var(--txt2);}
.hints{display:flex;flex-direction:column;gap:6px;margin-top:18px;max-width:440px;}
.hint{padding:9px 13px;border:.5px solid var(--bdr);border-radius:8px;
  font-size:12px;color:var(--txt2);text-align:left;cursor:pointer;
  background:var(--bg);font-family:inherit;}
.hint:hover{background:var(--bg2);border-color:var(--bdr2);}
.hint-l{font-size:8.5px;font-weight:600;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sb">
  <div class="sb-logo">
    <div class="sb-logo-icon">[·]</div>
    <span class="sb-logo-txt">ComplianceTwin</span>
  </div>
  <div class="sb-lbl">Active Context</div>
  <div class="ctx-card" onclick="editCtx()">
    <div class="ctx-co" id="ctx-co">My Company</div>

  </div>

  <div class="sess-list" id="sess-list"></div>

    <div class="user-av" id="user-av">?</div>
    <div>
      <div class="user-name" id="user-name">User</div>
      <div class="user-role-txt">Compliance Manager</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="mhdr">
    <div>
      <div class="mhdr-title" id="mhdr-t">New session</div>
      <div class="mhdr-meta" id="mhdr-m">Ask a compliance question to begin</div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="alert('Audit log coming soon')">Audit log ↗</button>
      <button class="hdr-btn" onclick="alert('Export coming soon')">Export PDF</button>
    </div>
  </div>

  <div id="msgs">
    <div id="welcome">
      <div style="font-size:24px;margin-bottom:12px;opacity:.4">⚖</div>
      <div class="wt">ComplianceTwin</div>
      <div class="ws">EU regulatory scope analysis — symbolic reasoning + AI.<br>Ask about your product or paste a product URL.</div>
      <div class="hints">
        <button class="hint" onclick="setQ('Does our AI-powered HR screening tool require a conformity assessment under the EU AI Act?')">
          <div class="hint-l">Try this</div>
          Does our AI HR screening tool need EU AI Act conformity assessment?
        </button>
        <button class="hint" onclick="setQ('We are a US company selling AI diagnostic software to hospitals in Germany. Does GDPR and MDR apply?')">
          <div class="hint-l">Try this</div>
          US company selling AI diagnostic software to German hospitals — GDPR & MDR?
        </button>
        <button class="hint" onclick="setQ('What is the EU AI Act and when does it apply?')">
          <div class="hint-l">General</div>
          What is the EU AI Act and when does it apply?
        </button>
      </div>
    </div>
  </div>

  <div id="acts"></div>

  <div id="inbar">
    <textarea id="cin" placeholder="Ask a compliance question or paste a URL..." rows="1"
      onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
    <button id="sbtn" onclick="send()">Send</button>
  </div>
</main>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const BACKEND = "https://sannawt-compliancetwin.hf.space";

const EURLEX = {
  GDPR:      "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679",
  EU_AI_ACT: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1689",
  MDR:       "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32017R0745",
};

const INST_LABELS = {
  GDPR:      "General Data Protection Regulation",
  EU_AI_ACT: "EU Artificial Intelligence Act",
  MDR:       "Medical Device Regulation",
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let SESSION_ID = crypto.randomUUID();
let msgs       = [];
let sessions   = [];
let activeSess = "new";
let msgCount   = 0;
let loading    = false;
let midN       = 0;
function nid(){ return "m"+(++midN); }

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(s){
  if(!s) return "";
  return esc(s)
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function autoH(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,100)+"px"; }
function onKey(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }
function setQ(q){ document.getElementById("cin").value=q; document.getElementById("cin").focus(); }

// ═══════════════════════════════════════════
// BACKEND
// ═══════════════════════════════════════════
async function callBackend(question){
  const res = await fetch(`${BACKEND}/chat`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ session_id:SESSION_ID, question })
  });
  if(!res.ok) throw new Error(`Backend error ${res.status}: ${await res.text()}`);
  return res.json();
}

async function analyzeUrl(url){
  const res = await fetch(`${BACKEND}/analyze_url`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ session_id:SESSION_ID, url })
  });
  if(!res.ok) throw new Error(`URL analysis failed ${res.status}`);
  return res.json();
}

function extractUrl(text){
  const m = text.match(/https?:\/\/[^\s]+/);
  return m ? m[0] : null;
}

// ═══════════════════════════════════════════
// TRACE RENDERING
// ═══════════════════════════════════════════

/*
 * Build the detailed trace panel HTML for one instrument.
 * Reads from symbolic.applicability_results[iid].trace
 * Groups entries by dimension, renders evidence + citations + notes.
 */
function renderTracePanel(iid, result, panelId){
  const trace = result.trace || [];
  if(!trace.length) return "";

  // Group by dimension, skip overall pass entries
  const dims = {};
  for(const entry of trace){
    const dim = entry.dimension || "other";
    if(dim === "overall" && entry.result === "pass") continue;
    if(!dims[dim]) dims[dim] = [];
    dims[dim].push(entry);
  }

  const DIM_ORDER = ["exclusion","temporal","territorial","material","overall"];
  const DIM_LABELS = {
    exclusion:   "Exclusions",
    temporal:    "Temporal scope",
    territorial: "Territorial scope",
    material:    "Material scope",
    overall:     "Overall",
  };

  const SYM = { pass:"✓", fail:"✗", cannot_determine:"?", prohibited:"⛔", not_reached:"–" };
  const SYM_CLS = { pass:"pass", fail:"fail", cannot_determine:"unk", prohibited:"fail", not_reached:"unk" };

  let html = `<div id="${panelId}" class="trace-panel">`;

  for(const dim of DIM_ORDER){
    const entries = dims[dim];
    if(!entries || !entries.length) continue;

    html += `<div class="trace-dim">${DIM_LABELS[dim]||cap(dim)}</div>`;

    for(const entry of entries){
      const r   = entry.result || "cannot_determine";
      const sym = SYM[r] || "?";
      const cls = SYM_CLS[r] || "unk";
      const ev  = entry.evidence || "";
      const note= entry.note || "";
      const cites = (entry.citations || []).slice(0,3).join("; ");

      // Tag governing/additional path labels
      let evHtml = esc(ev);
      if(ev.includes("← GOVERNING DATE")){
        evHtml = esc(ev.replace(" ← GOVERNING DATE",""))
          + `<span class="governing-tag">governing date</span>`;
      }
      if(ev.includes("[GOVERNING PATH]")){
        evHtml = esc(ev.replace(" [GOVERNING PATH]",""))
          + `<span class="governing-tag">governing path</span>`;
      }
      if(ev.includes("[ADDITIONAL PATH]")){
        evHtml = esc(ev.replace(" [ADDITIONAL PATH]",""))
          + `<span class="additional-tag">+ future path</span>`;
      }

      html += `<div class="trace-entry">
        <span class="trace-sym ${cls}">${sym}</span>
        <div>
          <div class="trace-ev">${evHtml}</div>
          ${cites ? `<div class="trace-cite">${esc(cites)}</div>` : ""}
          ${note  ? `<div class="trace-note">→ ${esc(note)}</div>` : ""}
        </div>
      </div>`;
    }
  }

  html += "</div>";
  return html;
}

/*
 * Build the scope pills row for one instrument.
 * Reads from scope_display[iid] for correct exclusion_triggered.
 */
function renderScopePills(iid, scopeDisplay, result){
  const sd = (scopeDisplay || {})[iid] || {};
  const scope = result.scope || {};

  const dims = ["temporal","territorial","material"];
  let pills = "";

  for(const d of dims){
    const r = scope[d];
    if(!r || r === "not_reached") continue;
    const cls = r==="pass" ? "ok" : r==="fail" ? "fail" : "unk";
    const icon= r==="pass" ? "✓" : r==="fail" ? "✗" : "?";
    pills += `<span class="pill ${cls}">${cap(d)} ${icon}</span>`;
  }

  // Exclusions: read from scope_display.exclusion_triggered
  // scope_display comes from build_scope_display() in narrative_patch.py
  // which reads scope.exclusions correctly — not the trace entries
  const exclTriggered = sd.exclusion_triggered === true;
  pills += `<span class="pill excl">Exclusions: ${exclTriggered ? "Triggered" : "None"}</span>`;

  // Risk category badge(s)
  const riskCats = sd.risk_categories || [];
  if(riskCats.length > 1){
    const labels = { high_risk_annex_III:"Annex III", high_risk_annex_I_sector_products:"Annex I",
                     GPAI_model:"GPAI", prohibited:"Prohibited" };
    for(const cat of riskCats){
      pills += `<span class="risk-badge">${labels[cat]||cat}</span>`;
    }
  } else if(sd.risk_category){
    const labels = { high_risk_annex_III:"Annex III High-Risk",
                     high_risk_annex_I_sector_products:"Annex I High-Risk",
                     GPAI_model:"GPAI", prohibited:"Prohibited" };
    pills += `<span class="risk-badge">${labels[sd.risk_category]||sd.risk_category}</span>`;
  }

  return pills;
}

// ═══════════════════════════════════════════
// SOURCES
// ═══════════════════════════════════════════
function renderSources(sources){
  if(!sources||!sources.length) return "";
  const id = "src-"+nid();
  const items = sources.map((s,i)=>`
    <div class="src-item">
      <span class="src-title">Source ${i+1}: ${esc(s.doc_title||"Document")}</span>
      <span class="src-score">${((s.score||0)*100).toFixed(1)}%</span>
      <div class="src-text">${esc((s.text||"").slice(0,180))}${s.text&&s.text.length>180?"...":""}</div>
    </div>`).join("");
  return `
    <button class="src-toggle" onclick="toggleEl('${id}')">
      📚 Transparency log (${sources.length} sources)
    </button>
    <div id="${id}" class="src-list">${items}</div>`;
}

function toggleEl(id){
  document.getElementById(id)?.classList.toggle("open");
}

function toggleFA(id){
  const el  = document.getElementById("fa-"+id);
  const btn = document.getElementById("fb-"+id);
  if(!el) return;
  const open = el.classList.toggle("open");
  btn.textContent = open ? "Collapse ↑" : "Read full analysis ↓";
}

function toggleTrace(panelId, toggleId){
  const panel  = document.getElementById(panelId);
  const toggle = document.getElementById(toggleId);
  if(!panel) return;
  const open = panel.classList.toggle("open");
  toggle.textContent = open ? "Hide reasoning ↑" : "View reasoning →";
}

// ═══════════════════════════════════════════
// RENDER COMPLIANCE RESPONSE
// ═══════════════════════════════════════════
function renderComplianceResponse(data, msgId){

  // Fallback for plain answer responses
  if(data.answer && !data.narrative){
    return `<div class="gen-bub">${fmt(data.answer)}</div>${renderSources(data.sources)}`;
  }

  const n            = data.narrative     || {};
  const sym          = data.symbolic      || {};
  const scopeDisplay = data.scope_display || {};
  const companyCtx   = data.company_context || null;  // null = KG not used
  const sources      = data.sources       || [];

  const vtype    = n.verdict_type       || "cannot_determine";
  const vline    = n.verdict_line       || "";
  const full     = n.full_analysis      || "";
  const cards    = n.legal_basis_cards  || [];
  const followUps= (sym.all_follow_up_questions || []).slice(0,3);

  // General / explanation / procedure responses
  if(vtype === "general"){
    return `
      <div class="vbub">
        <div class="v-info" style="font-size:13.5px;line-height:1.55;">${fmt(vline)}</div>
        ${full ? `<div style="margin-top:8px;font-size:12.5px;line-height:1.65;color:var(--txt);">${fmt(full)}</div>` : ""}
      </div>
      ${renderSources(sources)}`;
  }

  // Verdict line colour
  const vcls = vtype==="applies"     ? "v-yes" :
               vtype==="does_not_apply" ? "v-no"  :
               vtype==="cannot_determine" ? "v-unk" : "v-info";

  // ── Summary counts ───────────────────────────────────────────────
  const applyIds   = sym.instruments_that_apply     || [];
  const allResults = sym.applicability_results      || {};
  const allIds     = Object.keys(allResults);

  // Total pass/fail/unknown across all instruments that apply
  let passCount = 0, totalDims = 0;
  for(const iid of applyIds){
    const scope = (allResults[iid]||{}).scope || {};
    for(const d of ["temporal","territorial","material"]){
      if(scope[d] && scope[d] !== "not_reached"){
        totalDims++;
        if(scope[d] === "pass") passCount++;
      }
    }
  }

  // ── Legal basis cards ─────────────────────────────────────────────
  const cardsHtml = cards.map(c => `
    <div class="lc">
      <div class="lc-head">
        <span class="lc-lbl">Legal basis · ${esc(c.instrument_short||c.instrument_id||"")}</span>
        <a class="lc-lex" href="${esc(EURLEX[c.instrument_id]||'https://eur-lex.europa.eu')}" target="_blank">
          EUR-Lex ${esc(c.eurlex_article||"")} ↗
        </a>
      </div>
      <div class="lc-body">
        <div class="lc-arts">${esc(c.articles||"")}</div>
        <div class="lc-desc">${esc(c.description||"")}</div>
      </div>
    </div>`).join("");

  // ── Reasoning card — one section per instrument ───────────────────
  let reasoningInner = "";
  for(const iid of allIds){
    const result   = allResults[iid] || {};
    const verdict  = result.verdict  || "cannot_determine";
    const panelId  = `trace-${msgId}-${iid}`;
    const togId    = `ttog-${msgId}-${iid}`;

    const pillsHtml = renderScopePills(iid, scopeDisplay, result);
    const traceHtml = renderTracePanel(iid, result, panelId);

    const vIcon = verdict==="applies"         ? "✓" :
                  verdict==="does_not_apply"   ? "✗" :
                  verdict==="prohibited"        ? "⛔" : "?";
    const vColor= verdict==="applies"          ? "var(--green)" :
                  verdict==="does_not_apply"    ? "var(--red)"   :
                  verdict==="prohibited"        ? "var(--red)"   : "var(--amber)";

    reasoningInner += `
      <div class="inst-row">
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="font-size:10px;font-weight:600;color:${vColor};">${vIcon}</span>
          <span class="inst-name">${esc(INST_LABELS[iid]||iid)}</span>
        </div>
        <div class="pills">${pillsHtml}</div>
        ${traceHtml ? `
          <span class="trace-toggle" id="${togId}"
            onclick="toggleTrace('${panelId}','${togId}')">View reasoning →</span>
          ${traceHtml}
        ` : ""}
      </div>`;
  }

  const reasoningCard = allIds.length ? `
    <div class="rcard">
      <div class="rc-head">
        <span class="rc-lbl">Reasoning path</span>
        <span class="rc-pass">${passCount}/${totalDims} passed</span>
      </div>
      <div class="rc-body">${reasoningInner}</div>
    </div>` : "";

  // ── Company playbook — only when actually used ────────────────────
  // companyCtx is null when the KG returned nothing (most cases in prototype)
  const playbookCard = companyCtx ? `
    <div class="pb-card">
      <div class="rc-head">
        <span class="pb-lbl">Company playbook used</span>
        <span class="pb-view">View ↗</span>
      </div>
      <div class="pb-ctx">${esc(companyCtx.slice(0,200))}</div>
    </div>` : "";

  // ── Follow-up questions — only on cannot_determine ────────────────
  const fqHtml = (vtype==="cannot_determine" && followUps.length) ? `
    <div class="fq-card">
      <div class="fq-lbl">To complete this analysis, please clarify:</div>
      ${followUps.map(q=>`<div class="fq-q">› ${esc(q)}</div>`).join("")}
    </div>` : "";

  // ── Special category warning ──────────────────────────────────────
  const specHtml = sym.special_category_flag ? `
    <div class="fq-card" style="border-color:#fca5a5;background:#fef2f2;">
      <div class="fq-lbl" style="color:#7f1d1d;">GDPR Art. 9 — Special category data detected</div>
      <div class="fq-q" style="color:#991b1b;">
        Processing prohibited unless Art. 9(2) exception applies (e.g. Art. 9(2)(h) for healthcare). DPIA recommended under Art. 35.
      </div>
    </div>` : "";

  // ── Two-column layout: reasoning + playbook ───────────────────────
  const bottomRow = (playbookCard)
    ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        ${reasoningCard}${playbookCard}
       </div>`
    : reasoningCard;

  return `
    <div class="vbub">
      <div class="${vcls}" style="font-size:13.5px;line-height:1.55;">${fmt(vline)}</div>
      ${full ? `<div id="fa-${msgId}" class="full-a">${fmt(full)}</div>` : ""}
      <div class="expand-row">
        ${full ? `<button class="expand-btn" onclick="toggleFA('${msgId}')"><span id="fb-${msgId}">Read full analysis ↓</span></button>` : ""}
        <span class="expand-meta">
          ${applyIds.length} regulation${applyIds.length!==1?"s":""} analysed
          · ${passCount}/${totalDims} scope checks passed
        </span>
      </div>
    </div>
    ${cardsHtml}
    ${bottomRow}
    ${fqHtml}
    ${specHtml}
    ${renderSources(sources)}`;
}

// ═══════════════════════════════════════════
// RENDER ALL MESSAGES
// ═══════════════════════════════════════════
function renderMsgs(){
  const el = document.getElementById("msgs");

  if(!msgs.length){
    el.innerHTML = `<div id="welcome">
      <div style="font-size:24px;margin-bottom:12px;opacity:.4">⚖</div>
      <div class="wt">ComplianceTwin</div>
      <div class="ws">EU regulatory scope analysis — symbolic reasoning + AI.<br>Ask about your product or paste a product URL.</div>
      <div class="hints">
        <button class="hint" onclick="setQ('Does our AI-powered HR screening tool require a conformity assessment under the EU AI Act?')">
          <div class="hint-l">Try this</div>Does our AI HR screening tool need EU AI Act conformity assessment?
        </button>
        <button class="hint" onclick="setQ('We are a US company selling AI diagnostic software to hospitals in Germany. Does GDPR and MDR apply?')">
          <div class="hint-l">Try this</div>US company, AI diagnostic software, German hospitals — GDPR & MDR?
        </button>
        <button class="hint" onclick="setQ('What is the EU AI Act and when does it apply?')">
          <div class="hint-l">General</div>What is the EU AI Act and when does it apply?
        </button>
      </div>
    </div>`;
    return;
  }

  el.innerHTML = msgs.map(m => {
    if(m.role==="user") return `
      <div class="msg-user">
        <div class="user-bub">${esc(m.content)}</div>
      </div>`;

    if(m.type==="loading") return `
      <div class="msg-ai">
        <div class="ai-icon">[·]</div>
        <div class="ai-parts">
          <div class="vbub" style="padding:10px 14px;">
            <div class="ldots">
              <div class="ld"></div><div class="ld"></div><div class="ld"></div>
              <span class="ld-status">${esc(m.status||"Analysing...")}</span>
            </div>
          </div>
        </div>
      </div>`;

    return `
      <div class="msg-ai">
        <div class="ai-icon">[·]</div>
        <div class="ai-parts">${renderComplianceResponse(m.data, m.id)}</div>
      </div>`;
  }).join("");

  el.scrollTop = el.scrollHeight;
}

function renderActs(actions){
  const bar = document.getElementById("acts");
  if(!actions||!actions.length){ bar.style.display="none"; return; }
  bar.style.display = "flex";
  bar.innerHTML = actions.map((a,i)=>
    `<button class="act ${i===0?"pri":"sec"}"
      onclick="setQ('${esc(a.replace(/→\s*/,"").replace(/\s*↗/,""))}')">${esc(a)}</button>`
  ).join("");
}

function updateHdr(title){
  if(title) document.getElementById("mhdr-t").textContent = title;
  document.getElementById("mhdr-m").textContent =
    `Today · ${msgCount} message${msgCount!==1?"s":""} · session active`;
}

// ═══════════════════════════════════════════
// SESSIONS
// ═══════════════════════════════════════════
function renderSessions(){
  document.getElementById("sess-list").innerHTML = sessions.map(s=>`
    <div class="sess-item${s.id===activeSess?" active":""}" onclick="switchSess('${s.id}')">
      <div class="sess-title">${esc(s.title)}</div>
      <div class="sess-sub">${esc(s.sub)}</div>
    </div>`).join("");
}

function addSession(title, sub){
  if(activeSess==="new"){
    const id = "s"+Date.now();
    sessions.unshift({id, title, sub});
    activeSess = id;
  }
  renderSessions();
}

function switchSess(id){ activeSess=id; renderSessions(); }

function newSess(){
  activeSess="new"; msgs=[]; msgCount=0;
  SESSION_ID=crypto.randomUUID();
  document.getElementById("mhdr-t").textContent="New session";
  document.getElementById("mhdr-m").textContent="Ask a compliance question to begin";
  document.getElementById("acts").style.display="none";
  renderSessions(); renderMsgs();
}

// ═══════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════
async function send(){
  const inp  = document.getElementById("cin");
  const text = inp.value.trim();
  if(!text||loading) return;
  inp.value=""; inp.style.height="auto";
  loading=true;
  document.getElementById("sbtn").disabled=true;
  document.getElementById("welcome")?.remove();

  msgs.push({role:"user",content:text,id:nid()});
  msgCount++;
  renderMsgs();

  // URL detection — profile product before asking question
  const url = extractUrl(text);
  if(url){
    const lid=nid();
    msgs.push({type:"loading",id:lid,status:"Fetching product profile from URL..."});
    renderMsgs();
    try{
      const urlData = await analyzeUrl(url);
      msgs=msgs.filter(m=>m.id!==lid);
      msgs.push({role:"assistant",type:"response",id:nid(),data:{
        narrative:{verdict_type:"general",
          verdict_line:`Product profile loaded: ${urlData.profile||"Profile generated."}`,
          full_analysis:"",legal_basis_cards:[],suggested_actions:[]},
        symbolic:{},sources:[]
      }});
      renderMsgs();
    } catch(e){ msgs=msgs.filter(m=>m.id!==lid); }
  }

  const lid=nid();
  msgs.push({type:"loading",id:lid,status:"Running symbolic engine..."});
  renderMsgs();

  try{
    const data = await callBackend(text);
    msgs=msgs.filter(m=>m.id!==lid);
    const mid=nid();
    msgs.push({role:"assistant",type:"response",id:mid,data});
    const n=data.narrative||{};
    const sessionTitle=n.session_title||text.slice(0,35);
    addSession(sessionTitle,text.slice(0,50));
    updateHdr(sessionTitle);
    renderMsgs();
    renderActs(n.suggested_actions||[]);
  } catch(err){
    msgs=msgs.filter(m=>m.id!==lid);
    msgs.push({role:"assistant",type:"response",id:nid(),data:{
      narrative:{verdict_type:"cannot_determine",
        verdict_line:`Could not reach backend: ${err.message}`,
        full_analysis:`Make sure the ComplianceTwin backend is running at ${BACKEND}`,
        legal_basis_cards:[],suggested_actions:[]},
      symbolic:{},sources:[]
    }});
    renderMsgs();
  }

  loading=false;
  document.getElementById("sbtn").disabled=false;
}

// ═══════════════════════════════════════════
// CONTEXT EDITOR
// ═══════════════════════════════════════════
function editCtx(){
  const co=prompt("Company name:",document.getElementById("ctx-co").textContent);
  if(co) document.getElementById("ctx-co").textContent=co;
  const mkt=prompt("Markets:",document.getElementById("ctx-mkt").textContent);
  if(mkt) document.getElementById("ctx-mkt").textContent=mkt;
  const name=prompt("Your name:",document.getElementById("user-name").textContent);
  if(name){
    document.getElementById("user-name").textContent=name;
    document.getElementById("user-av").textContent=name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  }
}

// Init
renderSessions();
renderMsgs();
</script>
