
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceTwin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#2D6BE4;--blue-dk:#0F1D4E;--blue-lt:#e8f2ff;--blue-mid:#5b8fef;
  --cloud0:#ffffff;--cloud1:#f5f9ff;--cloud2:#eaf3ff;--cloud3:#d6eaff;--cloud4:#bdd9ff;
  --txt:#0f172a;--txt2:#374151;--txt3:#6b7280;--txt4:#9ca3af;
  --green:#059669;--green-l:rgba(5,150,105,.09);
  --red:#dc2626;--red-l:rgba(220,38,38,.08);
  --amber:#d97706;--amber-l:rgba(217,119,6,.09);
  --purple:#7c3aed;--purple-l:rgba(124,58,237,.09);
  --bdr:rgba(45,107,228,.11);--bdr2:rgba(45,107,228,.2);
  --glass:rgba(255,255,255,.8);
  --sh-xs:0 1px 3px rgba(15,29,78,.05),0 0 0 1px rgba(45,107,228,.07);
  --sh-sm:0 2px 8px rgba(15,29,78,.07),0 0 0 1px rgba(45,107,228,.07);
  --sh-md:0 4px 20px rgba(15,29,78,.08),0 1px 4px rgba(45,107,228,.05);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--r:13px;
}
body{font-family:var(--font);height:100vh;display:flex;overflow:hidden;font-size:13px;color:var(--txt);background:var(--cloud1);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 110% 70% at -5% 0%,rgba(195,221,255,.5) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 108% 100%,rgba(180,212,255,.4) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%,rgba(255,255,255,.85) 0%,transparent 70%),
    linear-gradient(180deg,#eef6ff 0%,#f8fcff 50%,#f0f8ff 100%);}
#poly-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:visible;opacity:.6;}
#sb,#main{position:relative;z-index:1;}

/* SIDEBAR */
#sb{width:244px;min-width:244px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:14px 14px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;}
.sb-sec{padding:11px 14px 3px;font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em;}
.ctx-card{margin:4px 10px 8px;padding:9px 11px;background:var(--blue-lt);border:1px solid var(--bdr2);border-radius:10px;cursor:pointer;transition:.15s;}
.ctx-card:hover{background:rgba(45,107,228,.12);}
.ctx-co{font-size:12px;font-weight:700;color:var(--txt);}
.ctx-mkt{font-size:10px;color:var(--txt3);margin-top:2px;}
.ctx-badge{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:20px;background:var(--blue);color:#fff;font-size:9px;font-weight:600;}
.sess-list{flex:1;overflow-y:auto;padding:2px 8px;}
.sess-list::-webkit-scrollbar{width:2px;}
.sess-list::-webkit-scrollbar-thumb{background:var(--cloud4);border-radius:2px;}
.sess-item{padding:7px 9px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:.12s;}
.sess-item:hover{background:var(--blue-lt);}
.sess-item.active{background:rgba(45,107,228,.1);border:1px solid var(--bdr2);}
.sess-title{font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-sub{font-size:10px;color:var(--txt4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.new-btn{margin:8px 10px;padding:7px 12px;border:1px dashed var(--bdr2);border-radius:8px;background:transparent;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:var(--font);transition:.12s;}
.new-btn:hover{background:var(--blue-lt);color:var(--blue);border-color:var(--blue);}
.user-foot{padding:10px 13px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.5);}
.user-av{width:30px;height:30px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.user-name{font-size:12px;font-weight:700;color:var(--txt);}
.user-role{font-size:9.5px;color:var(--txt4);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mhdr{padding:10px 22px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhdr-l{display:flex;align-items:center;gap:10px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.18);animation:pdot 2.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,.18);}50%{box-shadow:0 0 0 5px rgba(16,185,129,.07);}}
.mhdr-title{font-size:13.5px;font-weight:700;color:var(--txt);}
.mhdr-meta{font-size:10px;color:var(--txt4);margin-top:1px;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{padding:5px 12px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,.7);font-size:10.5px;color:var(--txt2);cursor:pointer;font-family:var(--font);transition:.12s;}
.hdr-btn:hover{background:var(--blue-lt);border-color:var(--bdr2);}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:var(--cloud4);border-radius:2px;}
.msg-user{display:flex;justify-content:flex-end;}
.user-bub{max-width:60%;padding:11px 16px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;border-radius:18px 18px 4px 18px;font-size:13px;line-height:1.55;font-weight:500;box-shadow:0 4px 16px rgba(45,107,228,.25);}
.msg-ai{display:flex;gap:10px;max-width:96%;}
.ai-icon{width:32px;height:32px;min-width:32px;background:var(--cloud0);border:1px solid var(--bdr);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0;box-shadow:var(--sh-sm);padding:5px;}
.ai-icon svg{width:100%;height:100%;display:block;}
.ai-parts{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;}

/* VERDICT BUBBLE — hero, always large */
.vbub{background:var(--cloud0);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;padding:16px 18px;box-shadow:var(--sh-md);}
.vbub.v-yes{border-left:3px solid var(--green);background:linear-gradient(135deg,rgba(5,150,105,.04) 0%,#fff 45%);}
.vbub.v-no {border-left:3px solid var(--red);  background:linear-gradient(135deg,rgba(220,38,38,.04) 0%,#fff 45%);}
.vbub.v-unk{border-left:3px solid var(--amber); background:linear-gradient(135deg,rgba(217,119,6,.04) 0%,#fff 45%);}
.vbub.v-info{border-left:3px solid var(--blue); background:linear-gradient(135deg,rgba(45,107,228,.04) 0%,#fff 45%);}
.vbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:10px;}
.vb-yes{background:var(--green-l);color:var(--green);}
.vb-no {background:var(--red-l);  color:var(--red);}
.vb-unk{background:var(--amber-l);color:var(--amber);}
.vb-info,.vb-ctx{background:var(--blue-lt);color:var(--blue);}
.verdict-line{font-size:14px;line-height:1.65;color:var(--txt);font-weight:500;}
.full-a{margin-top:13px;padding-top:12px;border-top:1px solid rgba(45,107,228,.1);font-size:13px;line-height:1.78;color:var(--txt2);}
.full-a.collapsed{display:none;}
.fa-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:10px;font-weight:600;color:var(--blue);cursor:pointer;}
.fa-toggle:hover{opacity:.7;}
.expand-meta{margin-top:10px;font-size:10px;color:var(--txt4);display:flex;align-items:center;gap:7px;}
.em-dot{width:3px;height:3px;border-radius:50%;background:var(--txt4);}

/* COLLAPSIBLE SECONDARY SECTIONS */
.sec-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:9px;cursor:pointer;background:rgba(255,255,255,.65);border:1px solid var(--bdr);transition:.12s;user-select:none;backdrop-filter:blur(8px);}
.sec-toggle:hover{background:var(--blue-lt);border-color:var(--bdr2);}
.sec-lbl{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:600;color:var(--txt2);}
.sec-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pip-blue{background:var(--blue);}
.pip-green{background:var(--green);}
.sec-right{display:flex;align-items:center;gap:8px;}
.sec-tag{font-size:9px;font-weight:700;color:var(--txt4);font-family:var(--mono);}
.sec-arr{font-size:9px;color:var(--txt4);transition:transform .2s;}
.sec-arr.open{transform:rotate(180deg);}
.sec-body{display:none;flex-direction:column;gap:7px;padding:3px 0 2px;}
.sec-body.open{display:flex;}

/* LEGAL CARDS */
.lc{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.lc-head{padding:7px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--cloud1);}
.lc-lbl{font-size:8px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.12em;}
.lc-lex{padding:2px 9px;border:1px solid rgba(45,107,228,.3);border-radius:20px;font-size:9px;color:var(--blue);text-decoration:none;transition:.12s;font-weight:600;}
.lc-lex:hover{background:var(--blue-lt);}
.lc-body{padding:9px 13px;}
.lc-arts{font-size:12.5px;font-weight:800;color:var(--txt);font-family:var(--mono);}
.lc-desc{font-size:10.5px;color:var(--txt2);margin-top:3px;line-height:1.5;}

/* REASONING */
.rcard{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.rcard-body{padding:10px 13px;display:flex;flex-direction:column;gap:10px;}
.inst-row{padding-bottom:9px;border-bottom:1px solid rgba(45,107,228,.08);}
.inst-row:last-child{padding-bottom:0;border-bottom:none;}
.inst-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.idot-yes{background:var(--green);box-shadow:0 0 0 2px var(--green-l);}
.idot-no {background:var(--red);  box-shadow:0 0 0 2px var(--red-l);}
.idot-unk{background:var(--amber);box-shadow:0 0 0 2px var(--amber-l);}
.inst-name{font-size:11px;font-weight:700;color:var(--txt);}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.pill{padding:2px 9px;border-radius:20px;font-size:9.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px;border:1px solid transparent;}
.pill.ok  {background:var(--green-l);color:var(--green);border-color:rgba(5,150,105,.18);}
.pill.fail{background:var(--red-l);  color:var(--red);  border-color:rgba(220,38,38,.14);}
.pill.unk {background:var(--amber-l);color:var(--amber);border-color:rgba(217,119,6,.14);}
.pill.excl{background:var(--cloud2); color:var(--txt3); border-color:var(--bdr);}
.risk-badge{padding:1px 8px;border-radius:5px;font-size:9px;font-weight:700;background:var(--blue-lt);color:var(--blue);border:1px solid rgba(45,107,228,.2);font-family:var(--mono);}
.risk-badge.ai{background:var(--purple-l);color:var(--purple);border-color:rgba(124,58,237,.2);}
.governing-tag{margin-left:5px;padding:0 6px;border-radius:8px;font-size:8px;font-weight:700;background:var(--blue-lt);color:var(--blue);}
.additional-tag{margin-left:5px;padding:0 6px;border-radius:8px;font-size:8px;font-weight:700;background:var(--purple-l);color:var(--purple);}
.trace-toggle{font-size:9.5px;color:var(--blue);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;padding:1px 0;}
.trace-toggle:hover{opacity:.75;}
.trace-panel{display:none;margin-top:6px;background:var(--cloud1);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;}
.trace-panel.open{display:block;}
.trace-dim-hdr{padding:4px 11px;font-size:8.5px;font-weight:800;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em;background:var(--cloud2);border-bottom:1px solid var(--bdr);}
.trace-entry{padding:6px 11px;border-bottom:1px solid var(--bdr);display:grid;grid-template-columns:16px 1fr;gap:7px;font-size:10.5px;align-items:start;}
.trace-entry:last-child{border-bottom:none;}
.trace-sym{font-weight:800;line-height:1.5;}
.ts-pass{color:var(--green);}.ts-fail{color:var(--red);}.ts-unk{color:var(--amber);}
.trace-ev{color:var(--txt);line-height:1.55;}
.trace-note{font-size:9.5px;color:var(--blue);margin-top:2px;}
.trace-cite{font-size:9px;color:var(--txt4);margin-top:1px;font-family:var(--mono);}

/* EUR-Lex chips in verdict bubble */
.lex-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.lex-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border:1px solid var(--bdr2);border-radius:20px;
  font-size:9.5px;font-weight:600;color:var(--blue);text-decoration:none;
  background:var(--blue-lt);transition:.12s;}
.lex-chip:hover{background:rgba(45,107,228,.15);}

/* Next steps section */
.step-row{display:grid;grid-template-columns:20px 1fr auto;gap:8px;
  align-items:start;padding:7px 0;border-bottom:1px solid var(--bdr);transition:.12s;border-radius:6px;padding-left:4px;}
.step-row:hover{background:var(--blue-lt);}
.step-row:last-child{border-bottom:none;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--blue);
  color:#fff;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-action{font-size:11.5px;color:var(--txt);line-height:1.5;}
.step-basis{font-size:9.5px;color:var(--txt3);margin-top:2px;font-family:var(--mono);}
.step-timing{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;}
.st-immediate{background:var(--red-l);color:var(--red);}
.st-before{background:var(--amber-l);color:var(--amber);}
.st-ongoing{background:var(--green-l);color:var(--green);}

/* Cannot-determine conditional card */
.cond-card{padding:12px 14px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue-lt),rgba(255,255,255,.8));
  border:1px solid var(--bdr2);}
.cond-title{font-size:8px;font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;color:var(--blue);margin-bottom:8px;}
.cond-scope-row{display:flex;align-items:center;gap:6px;
  padding:4px 0;font-size:11px;color:var(--txt2);}
.cond-scope-row .cs-dim{font-weight:600;color:var(--txt);min-width:90px;}
.cond-if{margin-top:10px;padding:8px 10px;border-radius:8px;
  background:rgba(45,107,228,.06);border:1px solid var(--bdr);
  font-size:11.5px;color:var(--txt2);line-height:1.6;}
.cond-if strong{color:var(--txt);}
.cond-q{margin-top:10px;padding:8px 10px;border-radius:8px;
  background:var(--amber-l);border:1px solid rgba(217,119,6,.2);
  font-size:11.5px;color:#78350f;font-weight:600;}
.trace-overall{margin:10px 10px 8px;padding:10px 12px;border-radius:8px;border:1px solid;}
.trace-overall.overall-pass{background:var(--green-l);border-color:rgba(5,150,105,.2);}
.trace-overall.overall-fail{background:var(--red-l);border-color:rgba(220,38,38,.15);}
.trace-overall.overall-unk{background:var(--amber-l);border-color:rgba(217,119,6,.15);}
.overall-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.trace-overall.overall-pass .overall-lbl{color:var(--green);}
.trace-overall.overall-fail .overall-lbl{color:var(--red);}
.trace-overall.overall-unk .overall-lbl{color:var(--amber);}
.overall-text{font-size:11px;line-height:1.65;color:var(--txt2);}

/* PLAYBOOK */
.pb-card{background:var(--cloud0);border:1px solid rgba(45,107,228,.2);border-radius:var(--r);padding:10px 13px;box-shadow:var(--sh-xs);}
.pb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.pb-lbl{font-size:8px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.12em;}
.pb-view{font-size:9.5px;color:var(--blue);cursor:pointer;font-weight:600;}
.pb-ctx{font-size:10.5px;color:var(--txt2);line-height:1.5;}

/* ALERTS */
.alert-card{padding:10px 14px;border-radius:10px;border:1px solid;}
.alert-clarify{background:linear-gradient(135deg,var(--amber-l),#fff);border-color:rgba(217,119,6,.22);}
.alert-art9{background:linear-gradient(135deg,var(--red-l),#fff);border-color:rgba(220,38,38,.18);}
.alert-lbl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;}
.alert-clarify .alert-lbl{color:#92400e;}.alert-art9 .alert-lbl{color:#991b1b;}
.alert-q{font-size:11.5px;margin-bottom:2px;}
.alert-clarify .alert-q{color:#78350f;}.alert-art9 .alert-q{color:#7f1d1d;}

/* SOURCES */
.src-toggle{padding:4px 11px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,.6);font-size:10px;color:var(--txt3);cursor:pointer;font-family:var(--font);transition:.12s;font-weight:500;}
.src-toggle:hover{background:var(--blue-lt);color:var(--blue);}
.src-list{display:none;margin-top:6px;padding:9px 11px;border:1px solid var(--bdr);border-radius:9px;background:var(--cloud0);}
.src-list.open{display:block;}
.src-item{padding:5px 0;border-bottom:1px solid var(--bdr);font-size:10.5px;}
.src-item:last-child{border-bottom:none;}
.src-title{font-weight:700;color:var(--txt);}
.src-score{color:var(--txt4);margin-left:6px;font-family:var(--mono);font-size:10px;}
.src-text{color:var(--txt2);margin-top:2px;line-height:1.45;font-size:10px;}

/* LOADING */
.ldots{display:flex;gap:4px;align-items:center;}
.ld{width:6px;height:6px;background:var(--cloud4);border-radius:50%;animation:bounce 1.1s infinite;}
.ld:nth-child(2){animation-delay:.18s;}.ld:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.ld-status{font-size:10.5px;color:var(--txt4);font-style:italic;margin-left:10px;}

/* ACTIONS */
#acts{padding:8px 22px;border-top:1px solid var(--bdr);display:none;flex-wrap:wrap;gap:6px;flex-shrink:0;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);}
.act{padding:6px 15px;border-radius:20px;font-size:11.5px;cursor:pointer;font-family:var(--font);border:none;transition:.12s;font-weight:600;}
.act.pri{background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;box-shadow:0 2px 8px rgba(45,107,228,.25);}
.act.pri:hover{transform:translateY(-1px);}
.act.sec{background:rgba(255,255,255,.8);color:var(--txt);border:1px solid var(--bdr);}
.act.sec:hover{background:var(--blue-lt);border-color:var(--bdr2);}

/* INPUT */
#inbar{padding:10px 22px 14px;border-top:1px solid var(--bdr);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;background:rgba(255,255,255,.78);backdrop-filter:blur(20px);}
#cin{flex:1;padding:11px 15px;border:1.5px solid var(--bdr2);border-radius:12px;font-size:13px;color:var(--txt);outline:none;resize:none;font-family:var(--font);line-height:1.4;max-height:100px;overflow-y:auto;background:var(--cloud0);transition:.15s;font-weight:500;}
#cin::placeholder{color:var(--txt4);font-weight:400;}
#cin:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,107,228,.1);}
#sbtn{padding:11px 20px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;border:none;border-radius:12px;font-size:13px;cursor:pointer;font-family:var(--font);flex-shrink:0;font-weight:700;transition:.15s;box-shadow:0 2px 10px rgba(45,107,228,.28);}

<script>
// ── ICON (brackets + dot only, no text) ─────────────────
const ICON_SVG=`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M18 7L9 7L9 41L18 41" stroke="#0F1D4E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M30 7L39 7L39 41L30 41" stroke="#2D6BE4" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="24" cy="24" r="4" fill="#2D6BE4"/>
</svg>`;

// ── POLYGON CLOUD MESH ───────────────────────────────────
(function(){
  const svg=document.getElementById("poly-bg");
  const W=window.innerWidth,H=window.innerHeight;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const cols=14,rows=9,pts=[];
  for(let r=0;r<=rows;r++)
    for(let c=0;c<=cols;c++)
      pts.push([(c/cols)*W+(Math.random()-.5)*W/cols*.6,(r/rows)*H+(Math.random()-.5)*H/rows*.6]);
  [[0,0],[W,0],[W,H],[0,H],[W/2,0],[W/2,H],[0,H/2],[W,H/2]].forEach(p=>pts.push(p));
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=r*(cols+1)+c;
      [[i,i+1,i+cols+1],[i+1,i+cols+2,i+cols+1]].forEach(tri=>{
        if(!pts[tri[0]]||!pts[tri[1]]||!pts[tri[2]]) return;
        const poly=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.setAttribute("points",tri.map(j=>`${clamp(pts[j][0],0,W).toFixed(1)},${clamp(pts[j][1],0,H).toFixed(1)}`).join(" "));
        const h=208+Math.floor(Math.random()*18),l=93+Math.floor(Math.random()*6);
        const a=(0.28+Math.random()*0.42).toFixed(2);
        poly.setAttribute("fill",`hsla(${h},50%,${l}%,${a})`);
        poly.setAttribute("stroke",`hsla(${h},40%,80%,0.3)`);
        poly.setAttribute("stroke-width","0.5");
        svg.appendChild(poly);
      });
    }
  }
})();

// ── CONFIG ───────────────────────────────────────────────
const BACKEND="https://sannawt-compliancetwin.hf.space";
const EURLEX={GDPR:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679",EU_AI_ACT:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1689",MDR:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32017R0745"};
const INST_LABELS={GDPR:"General Data Protection Regulation",EU_AI_ACT:"EU Artificial Intelligence Act",MDR:"Medical Device Regulation"};

const INST_FULL={GDPR:"the GDPR",EU_AI_ACT:"the EU AI Act",MDR:"the MDR"};

function fmtDate(iso){
  if(!iso) return iso;
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return iso.replace(/\b(\d{4})-(\d{2})-(\d{2})\b/g,(_,y,m,d)=>`${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`);
}

function fmtCitation(s, iid){
  if(!s) return s;
  const law = INST_FULL[iid] || "";
  // Expand Art. → Article
  let out = s
    .replace(/\bArt\.\s*/g,"Article ")
    .replace(/\bAnnex\b/g,"Annex");
  // Only append law name if the citation doesn't already reference a law
  // and if it looks like a pure article/recital reference (not a note/description)
  const looksLikeCitation = /^(Article|Recital|Annex|MDCG|IEC|ISO|EDPB)/i.test(out.trim());
  const alreadyHasLaw = out.toLowerCase().includes("of the") ||
    out.toLowerCase().includes("gdpr") ||
    out.toLowerCase().includes("mdr") ||
    out.toLowerCase().includes("ai act") ||
    out.toLowerCase().includes("ivdr");
  if(law && looksLikeCitation && !alreadyHasLaw){
    out = out + " of " + law;
  }
  return out;
}

function fmtTraceNote(note){
  if(!note) return "";
  return fmtDate(note)
    .replace(/Obligations under high_risk_annex_III/g,"Note: obligations for High-Risk AI systems (Annex III)")
    .replace(/Obligations under high_risk_annex_I_sector_products/g,"Note: obligations for AI safety components in regulated products (Annex I)")
    .replace(/high_risk_annex_III/g,"High-Risk AI (Annex III)")
    .replace(/high_risk_annex_I_sector_products/g,"High-Risk AI (Annex I — safety component)")
    .replace(/GPAI_model/g,"General Purpose AI model");
}

function fmtTraceEvidence(ev){
  if(!ev) return "";
  return fmtDate(ev)
    .replace(/high_risk_annex_III/g,"High-Risk AI (Annex III)")
    .replace(/high_risk_annex_I_sector_products/g,"High-Risk AI (Annex I)")
    .replace(/GPAI_model/g,"GPAI")
    .replace(/← GOVERNING DATE/g,"← governing date");
}

// ── STATE ────────────────────────────────────────────────
let SESSION_ID=crypto.randomUUID(),msgs=[],sessions=[],activeSess="new",msgCount=0,loading=false,midN=0;
const nid=()=>"m"+(++midN);

// ── UTILS ────────────────────────────────────────────────
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmt=s=>s?fmtDate(esc(s)).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>"):"";
const autoH=el=>{el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";};
const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
const setQ=q=>{document.getElementById("cin").value=q;document.getElementById("cin").focus();};
const toggleEl=id=>document.getElementById(id)?.classList.toggle("open");

function toggleFA(id){
  const el=document.getElementById("fa-"+id),btn=document.getElementById("fb-"+id);
  if(!el) return;
  const c=el.classList.toggle("collapsed");
  if(btn) btn.textContent=c?"Read full analysis ↓":"Collapse ↑";
}
function toggleSec(id){
  const body=document.getElementById("sec-"+id),arr=document.getElementById("arr-"+id);
  if(!body) return;
  body.classList.toggle("open");
  if(arr) arr.classList.toggle("open");
}
function toggleTrace(pid,tid){
  const p=document.getElementById(pid),t=document.getElementById(tid);
  if(!p) return;
  const o=p.classList.toggle("open");
  t.innerHTML=o?"▲ Hide reasoning":"▼ View reasoning";

async function callBackend(q){
  const r=await fetch(`${BACKEND}/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id:SESSION_ID,question:q})});
  if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function analyzeUrl(url){

  if(!r.ok) throw new Error(`URL ${r.status}`);
  return r.json();
}
const extractUrl=t=>{const m=t.match(/https?:\/\/[^\s]+/);return m?m[0]:null;};

// ── TRACE ────────────────────────────────────────────────
function renderTracePanel(iid,result,panelId){
  const trace=result.trace||[];if(!trace.length) return "";
  const dims={};
  // Separate overall entry for special rendering
  let overallEntry = null;
  for(const e of trace){
    const d=e.dimension||"other";
    if(d==="overall"){ overallEntry=e; continue; }
    (dims[d]=dims[d]||[]).push(e);
  }
  const ORDER=["temporal","territorial","material","exclusion"];
  const DLBL={temporal:"Temporal scope",territorial:"Territorial scope",material:"Material scope",exclusion:"Exclusions"};
  const SYM={pass:"✓",fail:"✗",cannot_determine:"–",prohibited:"⛔",not_reached:"–"};
  const CLS={pass:"ts-pass",fail:"ts-fail",cannot_determine:"ts-unk",prohibited:"ts-fail",not_reached:"ts-unk"};
  let html=`<div id="${panelId}" class="trace-panel">`;
  for(const dim of ORDER){
    const entries=dims[dim];if(!entries?.length) continue;
    html+=`<div class="trace-dim-hdr">${DLBL[dim]||dim}</div>`;
    for(const e of entries){
      const r=e.result||"cannot_determine";
      // Format evidence: dates, tag labels, governing markers
      let ev = fmtTraceEvidence(esc(e.evidence||""));
      if(e.evidence?.includes("← GOVERNING DATE"))
        ev=fmtDate(esc(e.evidence.replace(" ← GOVERNING DATE","")))+`<span class="governing-tag">governing date</span>`;
      if(e.evidence?.includes("[GOVERNING PATH]"))
        ev=fmtDate(esc(e.evidence.replace(" [GOVERNING PATH]","")))+`<span class="governing-tag">governing path</span>`;
      if(e.evidence?.includes("[ADDITIONAL PATH]"))
        ev=fmtDate(esc(e.evidence.replace(" [ADDITIONAL PATH]","")))+`<span class="additional-tag">+ future path</span>`;
      // Format citations: "Art. 113 of the EU AI Act" style
      const rawCites=(e.citations||[]).slice(0,3);
      const cites=rawCites.map(c=>fmtCitation(c,iid)).join("; ");
      const note = fmtTraceNote(e.note||"");
      html+=`<div class="trace-entry">
        <span class="trace-sym ${CLS[r]||"ts-unk"}">${SYM[r]||"–"}</span>
        <div>
          <div class="trace-ev">${ev}</div>
          ${cites?`<div class="trace-cite">${esc(cites)}</div>`:""}
          ${note?`<div class="trace-note">→ ${esc(note)}</div>`:""}
        </div>
      </div>`;
    }
  }
  // Overall assessment — rendered as a clear summary paragraph, not a trace row
  if(overallEntry){
    const r=overallEntry.result||"cannot_determine";
    const overallCls = r==="pass"?"overall-pass":r==="fail"?"overall-fail":"overall-unk";
    // Check if failure is due to temporal only — use conditional language
    const temporalFailed = (dims["temporal"]||[]).some(e=>e.result==="fail");
    const territorOrMatPassed = (dims["territorial"]||[]).some(e=>e.result==="pass") &&
                                (dims["material"]||[]).some(e=>e.result==="pass");
    let overallLbl, overallEvidence;
    if(r==="fail" && temporalFailed && territorOrMatPassed){
      overallLbl = "Does not apply yet — but would apply once in force";
      overallEvidence = fmt(fmtDate(overallEntry.evidence||"")) +
        `<div style="margin-top:6px;padding:6px 8px;border-radius:6px;background:rgba(45,107,228,.07);font-size:11px;color:var(--txt2);">
          <strong>Conditional note:</strong> Territorial and material scope are both satisfied. Once the applicable date is reached, the obligations will apply in full and a conformity assessment or equivalent compliance steps will be required.
        </div>`;
    } else if(r==="pass"){
      overallLbl = "Regulation applies";
      overallEvidence = fmt(fmtDate(overallEntry.evidence||""));
    } else {
      overallLbl = r==="cannot_determine"?"Assessment incomplete":"Regulation does not apply";
      overallEvidence = fmt(fmtDate(overallEntry.evidence||""));
    }
    html+=`<div class="trace-overall ${overallCls}">
      <div class="overall-lbl">${overallLbl}</div>
      <div class="overall-text">${overallEvidence}</div>
    </div>`;
  }
  return html+"</div>";
}

function renderScopePills(iid,sd,result){
  const scope=result.scope||{};let pills="";
  for(const d of ["temporal","territorial","material"]){
    const r=scope[d];if(!r||r==="not_reached")continue;
    pills+=`<span class="pill ${r==="pass"?"ok":r==="fail"?"fail":"unk"}">${d[0].toUpperCase()+d.slice(1)} ${r==="pass"?"✓":r==="fail"?"✗":"?"}</span>`;
  }
  const excl=(sd||{})[iid]?.exclusion_triggered===true;
  pills+=`<span class="pill excl">Excl. ${excl?"Triggered":"None"}</span>`;
  const cats=((sd||{})[iid]?.risk_categories)||[];
  if(cats.length>1){const L={high_risk_annex_III:"Annex III",high_risk_annex_I_sector_products:"Annex I",GPAI_model:"GPAI",prohibited:"Prohibited"};cats.forEach(c=>pills+=`<span class="risk-badge${c.includes("annex_I_sector")?" ai":""}">${L[c]||c}</span>`);}
  else if((sd||{})[iid]?.risk_category){const L={high_risk_annex_III:"Annex III HR",high_risk_annex_I_sector_products:"Annex I HR",GPAI_model:"GPAI",prohibited:"Prohibited"};pills+=`<span class="risk-badge">${L[(sd||{})[iid].risk_category]||(sd||{})[iid].risk_category}</span>`;}
  return pills;
}

// ── SOURCES ──────────────────────────────────────────────
function renderSources(sources){
  if(!sources?.length) return "";
  const id="src-"+nid();
  return `<button class="src-toggle" onclick="toggleEl('${id}')">📚 Transparency log (${sources.length} sources)</button><div id="${id}" class="src-list">${sources.map((s,i)=>`<div class="src-item"><span class="src-title">Source ${i+1}: ${esc(s.doc_title||"Document")}</span><span class="src-score">${((s.score||0)*100).toFixed(1)}%</span><div class="src-text">${esc((s.text||"").slice(0,160))}${(s.text?.length>160)?"…":""}</div></div>`).join("")}</div>`;
}

// ── VERDICT HELPERS ───────────────────────────────────────
function vbadge(vtype){
  const M={applies:{cls:"vb-yes",i:"✓",t:"Applies"},does_not_apply:{cls:"vb-no",i:"✗",t:"Does not apply"},cannot_determine:{cls:"vb-unk",i:"",t:"More information needed"},general:{cls:"vb-info",i:"",t:"Information"},context_update:{cls:"vb-ctx",i:"→",t:"Context saved"}};
  const v=M[vtype]||M.cannot_determine;
  return `<div class="vbadge ${v.cls}">${v.i?v.i+' ':''}${v.t}</div>`;
}
const vbubCls=vtype=>({applies:"v-yes",does_not_apply:"v-no",cannot_determine:"v-unk",general:"v-info",context_update:"v-info"}[vtype]||"v-info");

// ── MAIN RENDER ───────────────────────────────────────────
function renderComplianceResponse(data,msgId){
  if(data.answer&&!data.narrative)
    return `<div class="vbub v-info"><div class="verdict-line">${fmt(data.answer)}</div></div>${renderSources(data.sources)}`;

  const n=data.narrative||{},sym=data.symbolic||{},sd=data.scope_display||{},cc=data.company_context||null;
  const vtype=n.verdict_type||"cannot_determine",vline=n.verdict_line||"",full=n.full_analysis||"";
  const cards=n.legal_basis_cards||[],fups=(sym.all_follow_up_questions||[]).slice(0,3);
  const nextSteps=n.next_steps||[];
  const clarQ=n.clarifying_question||null;

  // Simple layouts
  if(vtype==="general"||vtype==="context_update")
    return `<div class="vbub ${vbubCls(vtype)}">${vbadge(vtype)}<div class="verdict-line">${fmt(vline)}</div>${full?`<div class="full-a">${fmt(full)}</div>`:""}</div>${renderSources(data.sources||[])}`;

  const applyIds=sym.instruments_that_apply||[],allRes=sym.applicability_results||{};
  let passCount=0,totalDims=0;
  for(const iid of applyIds){const scope=(allRes[iid]||{}).scope||{};for(const d of ["temporal","territorial","material"])if(scope[d]&&scope[d]!=="not_reached"){totalDims++;if(scope[d]==="pass")passCount++;}}
  const nInst=Object.keys(allRes).length;

  // EUR-Lex chips from legal_basis_cards (links only — no separate section)
  const lexChips=cards.length?`<div class="lex-chips">${cards.map(c=>{
    const url=c.eurlex_url||(EURLEX[c.instrument_id]||"https://eur-lex.europa.eu");
    const label=`${c.instrument_short||c.instrument_id}${c.eurlex_article?" · "+c.eurlex_article:""}`;
    return `<a class="lex-chip" href="${esc(url)}" target="_blank">${esc(label)} ↗</a>`;
  }).join("")}</div>`:"";

  // ── HERO VERDICT BUBBLE ────────────────────────────────────────────────────
  const heroBub=`<div class="vbub ${vbubCls(vtype)}">
    ${vbadge(vtype)}
    <div class="verdict-line">${fmt(vline)}</div>
    ${full?`<div id="fa-${msgId}" class="full-a">${fmt(full)}</div>
    <div><span class="fa-toggle" id="fb-${msgId}" onclick="toggleFA('${msgId}')">Collapse ↑</span></div>`:""}
    ${lexChips}
    <div class="expand-meta">
      <span>${nInst} instrument${nInst!==1?"s":""} evaluated</span>
      ${totalDims?`<span class="em-dot"></span><span>${passCount}/${totalDims} scope checks passed</span>`:""}
    </div>
  </div>`;

  // ── CANNOT DETERMINE — conditional scope card ──────────────────────────────
  let condCard="";
  if(vtype==="cannot_determine"&&nInst>0){
    const SCOPE_LABELS={temporal:"Temporal scope",territorial:"Territorial scope",material:"Material scope"};
    const DIM_COLORS={pass:"var(--green)",fail:"var(--red)",cannot_determine:"var(--amber)",unknown:"var(--txt4)"};
    const DIM_ICONS={pass:"✓",fail:"✗",cannot_determine:"–",unknown:"–"};
    let scopeRows="";
    for(const iid of Object.keys(allRes)){
      const res=allRes[iid]||{},scope=res.scope||{};
      const iLabel=INST_LABELS[iid]||iid;
      scopeRows+=`<div style="margin-bottom:8px;"><div style="font-size:10px;font-weight:700;color:var(--txt);margin-bottom:4px;">${esc(iLabel)}</div>`;
      for(const d of ["temporal","territorial","material"]){
        const r=scope[d]||"unknown";
        const col=DIM_COLORS[r]||DIM_COLORS.unknown;
        const ico=DIM_ICONS[r]||"–";
        const lbl=r==="pass"?"Satisfied":r==="fail"?"Not satisfied":"Requires clarification";
        scopeRows+=`<div class="cond-scope-row"><span class="cs-dim">${SCOPE_LABELS[d]}</span><span style="color:${col};font-weight:700;">${ico}</span><span style="margin-left:4px;">${lbl}</span></div>`;
      }
      scopeRows+="</div>";
    }
    const condIf=fups.length?`<div class="cond-if">Based on the information available, if the outstanding question${fups.length>1?"s are":"is"} resolved favourably, the applicable regulation${nInst>1?"s":""} would be confirmed. <strong>The key question${fups.length>1?"s":""} to answer:</strong></div>`:""
    const condQs=fups.map(q=>`<div class="cond-q">› ${esc(q)}</div>`).join("");
    condCard=`<div class="cond-card">
      <div class="cond-title">Scope analysis — information needed</div>
      ${scopeRows}
      ${condIf}${condQs}
    </div>`;
  }

  // ── SCOPE ANALYSIS (renamed + reordered, no duplicate legal basis) ─────────
  let rows="";
  for(const iid of Object.keys(allRes)){
    const res=allRes[iid]||{},verdict=res.verdict||"cannot_determine";
    const panelId=`trace-${msgId}-${iid}`,togId=`ttog-${msgId}-${iid}`;
    const dotCls=verdict==="applies"?"idot-yes":verdict==="does_not_apply"?"idot-no":"idot-unk";
    const th=renderTracePanel(iid,res,panelId);
    rows+=`<div class="inst-row"><div class="inst-hdr"><div class="idot ${dotCls}"></div><span class="inst-name">${esc(INST_LABELS[iid]||iid)}</span></div><div class="pills">${renderScopePills(iid,sd,res)}</div>${th?`<span class="trace-toggle" id="${togId}" onclick="toggleTrace('${panelId}','${togId}')">▼ View scope detail</span>${th}`:""}</div>`;
  }
  const pbCard=cc?`<div class="pb-card"><div class="pb-head"><span class="pb-lbl">Company playbook used</span><span class="pb-view">View ↗</span></div><div class="pb-ctx">${esc(cc.slice(0,220))}</div></div>`:"";
  const reasonInner=pbCard?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div class="rcard"><div class="rcard-body">${rows}</div></div>${pbCard}</div>`:`<div class="rcard"><div class="rcard-body">${rows}</div></div>`;

  const rpSec=nInst?`<div>
    <div class="sec-toggle" onclick="toggleSec('rp-${msgId}')">
      <span class="sec-lbl"><span class="sec-pip pip-green"></span>Scope analysis · ${nInst} instrument${nInst!==1?"s":""} evaluated</span>
      <span class="sec-right"><span class="sec-tag">${passCount}/${totalDims} checks passed</span><span class="sec-arr" id="arr-rp-${msgId}">▾</span></span>
    </div>
    <div id="sec-rp-${msgId}" class="sec-body">${reasonInner}</div>
  </div>`:"";

  // ── NEXT STEPS ─────────────────────────────────────────────────────────────
  let nsSec="";
  if(nextSteps.length){
    const TIMING_CLS={Immediate:"st-immediate","Before market placement":"st-before",Ongoing:"st-ongoing"};
    const stepRows=nextSteps.map((s,i)=>{
      const q=s.action||"";
      return `<div class="step-row" style="cursor:pointer;" onclick="setQ('${esc(q)}'); send()" title="Click to ask ComplianceTwin about this step">
        <div class="step-num">${i+1}</div>
        <div>
          <div class="step-action">${esc(q)} <span style="font-size:9px;color:var(--blue);margin-left:4px;">→ ask ↗</span></div>
          <div class="step-basis">${esc(s.basis||"")}</div>
        </div>
        <div class="step-timing ${TIMING_CLS[s.timing]||"st-ongoing"}">${esc(s.timing||"Ongoing")}</div>
      </div>`;
    }).join("");
    nsSec=`<div>
      <div class="sec-toggle" onclick="toggleSec('ns-${msgId}')">
        <span class="sec-lbl"><span class="sec-pip" style="background:var(--blue)"></span>Recommended next steps · ${nextSteps.length}</span>
        <span class="sec-right"><span class="sec-arr" id="arr-ns-${msgId}">▾</span></span>
      </div>
      <div id="sec-ns-${msgId}" class="sec-body">
        <div class="rcard"><div class="rcard-body">${stepRows}</div></div>
      </div>
    </div>`;
  }

  // ── ALERTS ─────────────────────────────────────────────────────────────────
  const specHtml=sym.special_category_flag?`<div class="alert-card alert-art9"><div class="alert-lbl">GDPR Art. 9 — Special category data detected</div><div class="alert-q">Processing prohibited unless Art. 9(2) exception applies (e.g. Art. 9(2)(h) for healthcare).</div></div>`:"";

  return `${heroBub}${condCard}${rpSec}${nsSec}${specHtml}${renderSources(data.sources||[])}`;
}

function welcomeHTML(){
  return `<div id="welcome">
    <div><svg width="240" height="52" viewBox="0 0 220 48" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 6 L8 6 L8 42 L18 42" fill="none" stroke="#0F1D4E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30 6 L40 6 L40 42 L30 42" fill="none" stroke="#2D6BE4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24" cy="24" r="3.5" fill="#2D6BE4"/>
      <text x="56" y="31" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a" letter-spacing="-0.3">ComplianceTwin</text>
    </svg></div>
    <div class="wt">EU regulatory scope analysis</div>
    <div class="ws">Symbolic reasoning engine + AI explanation.<br>Every verdict is cited, traceable and auditable.</div>
    <div class="hint-grid">
      <button class="hint" onclick="setQ('Does our AI HR screening application require conformity assessment under the EU AI Act?'); send()"><div class="hint-l">Applicability</div>AI HR screening — does it require EU AI Act conformity assessment?</button>
      <button class="hint" onclick="setQ('We are a US company selling AI diagnostic software to hospitals in Germany. Does GDPR and MDR apply?'); send()"><div class="hint-l">Multi-regulation</div>US company, AI diagnostics, German hospitals — GDPR & MDR?</button>
      <button class="hint hint-full" onclick="setQ('What is the EU AI Act and when does it apply?'); send()"><div class="hint-l">Explanation</div>What is the EU AI Act and when does it apply?</button>
    </div>
  </div>`;
}

// ── RENDER MESSAGES ───────────────────────────────────────
function renderMsgs(){
  const el=document.getElementById("msgs");
  if(!msgs.length){el.innerHTML=welcomeHTML();return;}
  el.innerHTML=msgs.map(m=>{
    if(m.role==="user") return `<div class="msg-user"><div class="user-bub">${esc(m.content)}</div></div>`;
    if(m.type==="loading") return `<div class="msg-ai"><div class="ai-icon">${ICON_SVG}</div><div class="ai-parts"><div class="vbub v-info" style="padding:12px 17px;"><div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div><span class="ld-status">${esc(m.status||"Analysing…")}</span></div></div></div></div>`;
    return `<div class="msg-ai"><div class="ai-icon">${ICON_SVG}</div><div class="ai-parts">${renderComplianceResponse(m.data,m.id)}</div></div>`;
  }).join("");
  el.scrollTop=el.scrollHeight;
}

function renderActs(actions){
  const bar=document.getElementById("acts");
  if(!actions?.length){bar.style.display="none";return;}
  bar.style.display="flex";
  bar.innerHTML=actions.map((a,i)=>`<button class="act ${i===0?"pri":"sec"}" onclick="setQ('${esc(a.replace(/→\s*/,"").replace(/\s*↗/,""))}')">${esc(a)}</button>`).join("");
}

function updateHdr(t){
  if(t) document.getElementById("mhdr-t").textContent=t;
  document.getElementById("mhdr-m").textContent=`Today · ${msgCount} message${msgCount!==1?"s":""} · session active`;
}

// ── SESSIONS ──────────────────────────────────────────────
function renderSessions(){document.getElementById("sess-list").innerHTML=sessions.map(s=>`<div class="sess-item${s.id===activeSess?" active":""}" onclick="switchSess('${s.id}')"><div class="sess-title">${esc(s.title)}</div><div class="sess-sub">${esc(s.sub)}</div></div>`).join("");}
function addSession(t,s){if(activeSess==="new"){const id="s"+Date.now();sessions.unshift({id,title:t,sub:s});activeSess=id;}renderSessions();}
function switchSess(id){activeSess=id;renderSessions();}
function newSess(){activeSess="new";msgs=[];msgCount=0;SESSION_ID=crypto.randomUUID();document.getElementById("mhdr-t").textContent="New session";document.getElementById("mhdr-m").textContent="Ask a compliance question to begin";document.getElementById("acts").style.display="none";renderSessions();renderMsgs();}

// ── SEND ──────────────────────────────────────────────────
async function send(){
  const inp=document.getElementById("cin"),text=inp.value.trim();
  if(!text||loading) return;
  inp.value="";inp.style.height="auto";loading=true;document.getElementById("sbtn").disabled=true;
  document.getElementById("welcome")?.remove();
  msgs.push({role:"user",content:text,id:nid()});msgCount++;renderMsgs();
  const url=extractUrl(text);
  if(url){
    const lid=nid();msgs.push({type:"loading",id:lid,status:"Fetching product profile…"});renderMsgs();
    try{const d=await analyzeUrl(url);msgs=msgs.filter(m=>m.id!==lid);msgs.push({role:"assistant",type:"response",id:nid(),data:{narrative:{verdict_type:"general",verdict_line:`Product profile loaded: ${d.profile||"Profile generated."}`,full_analysis:"",legal_basis_cards:[],suggested_actions:[]},symbolic:{},scope_display:{},company_context:null,sources:[]}});renderMsgs();}
    catch(e){msgs=msgs.filter(m=>m.id!==lid);}
  }
  const lid=nid();msgs.push({type:"loading",id:lid,status:"Running symbolic engine…"});renderMsgs();
  try{
    const data=await callBackend(text);msgs=msgs.filter(m=>m.id!==lid);
    msgs.push({role:"assistant",type:"response",id:nid(),data});
    const n=data.narrative||{};addSession(n.session_title||text.slice(0,35),text.slice(0,50));updateHdr(n.session_title||text.slice(0,35));renderMsgs();renderActs(n.suggested_actions||[]);
  }catch(err){
    msgs=msgs.filter(m=>m.id!==lid);
    msgs.push({role:"assistant",type:"response",id:nid(),data:{narrative:{verdict_type:"cannot_determine",verdict_line:`Could not reach backend: ${err.message}`,full_analysis:`Ensure backend is running at ${BACKEND}`,legal_basis_cards:[],suggested_actions:[]},symbolic:{},scope_display:{},company_context:null,sources:[]}});
    renderMsgs();
  }
  loading=false;document.getElementById("sbtn").disabled=false;
}

// ── CONTEXT EDITOR ────────────────────────────────────────
function editCtx(){
  const co=prompt("Company name:",document.getElementById("ctx-co").textContent);if(co)document.getElementById("ctx-co").textContent=co;
  const mkt=prompt("Markets:",document.getElementById("ctx-mkt").textContent);if(mkt)document.getElementById("ctx-mkt").textContent=mkt;
  const name=prompt("Your name:",document.getElementById("user-name").textContent);
  if(name){document.getElementById("user-name").textContent=name;document.getElementById("user-av").textContent=name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
}

renderSessions();renderMsgs();
</script>
