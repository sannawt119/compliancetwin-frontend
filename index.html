
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceTwin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#2D6BE4;--blue-dk:#0F1D4E;--blue-lt:#e8f2ff;--blue-mid:#5b8fef;
  --cloud0:#ffffff;--cloud1:#f5f9ff;--cloud2:#eaf3ff;--cloud3:#d6eaff;--cloud4:#bdd9ff;
  --txt:#0f172a;--txt2:#374151;--txt3:#6b7280;--txt4:#9ca3af;
  --green:#059669;--green-l:rgba(5,150,105,.09);
  --red:#dc2626;--red-l:rgba(220,38,38,.08);
  --amber:#d97706;--amber-l:rgba(217,119,6,.09);
  --purple:#7c3aed;--purple-l:rgba(124,58,237,.09);
  --def:#1e3a8a;--def-mid:#2d55c8;--def-l:rgba(30,58,138,.08);--def-lt:#eef2ff;
  --bdr:rgba(45,107,228,.11);--bdr2:rgba(45,107,228,.2);
  --glass:rgba(255,255,255,.8);
  --sh-xs:0 1px 3px rgba(15,29,78,.05),0 0 0 1px rgba(45,107,228,.07);
  --sh-sm:0 2px 8px rgba(15,29,78,.07),0 0 0 1px rgba(45,107,228,.07);
  --sh-md:0 4px 20px rgba(15,29,78,.08),0 1px 4px rgba(45,107,228,.05);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--r:13px;
}
body{font-family:var(--font);height:100vh;display:flex;overflow:hidden;font-size:13px;color:var(--txt);background:var(--cloud1);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 110% 70% at -5% 0%,rgba(195,221,255,.5) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 108% 100%,rgba(180,212,255,.4) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%,rgba(255,255,255,.85) 0%,transparent 70%),
    linear-gradient(180deg,#eef6ff 0%,#f8fcff 50%,#f0f8ff 100%);}
#poly-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:visible;opacity:.6;}
#sb,#main{position:relative;z-index:1;}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sb{width:244px;min-width:244px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:14px 14px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;}
.sb-sec{padding:11px 14px 3px;font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em;}
.ctx-card{margin:4px 10px 8px;padding:9px 11px;background:var(--blue-lt);border:1px solid var(--bdr2);border-radius:10px;cursor:pointer;transition:.15s;}
.ctx-card:hover{background:rgba(45,107,228,.12);}
.ctx-co{font-size:12px;font-weight:700;color:var(--txt);}
.ctx-mkt{font-size:10px;color:var(--txt3);margin-top:2px;}
.ctx-badge{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:20px;background:var(--blue);color:#fff;font-size:9px;font-weight:600;}
.sess-list{flex:1;overflow-y:auto;padding:2px 8px;}
.sess-list::-webkit-scrollbar{width:2px;}
.sess-list::-webkit-scrollbar-thumb{background:var(--cloud4);border-radius:2px;}
.sess-item{padding:7px 9px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:.12s;}
.sess-item:hover{background:var(--blue-lt);}
.sess-item.active{background:rgba(45,107,228,.1);border:1px solid var(--bdr2);}
.sess-title{font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-sub{font-size:10px;color:var(--txt4);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.new-btn{margin:8px 10px;padding:7px 12px;border:1px dashed var(--bdr2);border-radius:8px;background:transparent;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:var(--font);transition:.12s;}
.new-btn:hover{background:var(--blue-lt);color:var(--blue);border-color:var(--blue);}
.user-foot{padding:10px 13px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.5);}
.user-av{width:30px;height:30px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.user-name{font-size:12px;font-weight:700;color:var(--txt);}
.user-role{font-size:9.5px;color:var(--txt4);}

/* ── MAIN ────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mhdr{padding:10px 22px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhdr-l{display:flex;align-items:center;gap:10px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.18);animation:pdot 2.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,.18);}50%{box-shadow:0 0 0 5px rgba(16,185,129,.07);}}
.mhdr-title{font-size:13.5px;font-weight:700;color:var(--txt);}
.mhdr-meta{font-size:10px;color:var(--txt4);margin-top:1px;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{padding:5px 12px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,.7);font-size:10.5px;color:var(--txt2);cursor:pointer;font-family:var(--font);transition:.12s;}
.hdr-btn:hover{background:var(--blue-lt);border-color:var(--bdr2);}

/* ── MESSAGES ────────────────────────────────────────────── */
#msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:var(--cloud4);border-radius:2px;}
.msg-user{display:flex;justify-content:flex-end;}
.user-bub{max-width:60%;padding:11px 16px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;border-radius:18px 18px 4px 18px;font-size:13px;line-height:1.55;font-weight:500;box-shadow:0 4px 16px rgba(45,107,228,.25);}
.msg-ai{display:flex;gap:10px;max-width:96%;}
.ai-icon{width:32px;height:32px;min-width:32px;background:var(--cloud0);border:1px solid var(--bdr);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0;box-shadow:var(--sh-sm);padding:5px;}
.ai-icon svg{width:100%;height:100%;display:block;}
.ai-parts{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;}

/* ── VERDICT BUBBLE ─────────────────────────────────────── */
.vbub{background:var(--cloud0);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;padding:16px 18px;box-shadow:var(--sh-md);}
.vbub.v-yes {border-left:3px solid var(--green); background:linear-gradient(135deg,rgba(5,150,105,.04) 0%,#fff 45%);}
.vbub.v-no  {border-left:3px solid var(--red);   background:linear-gradient(135deg,rgba(220,38,38,.04) 0%,#fff 45%);}
.vbub.v-unk {border-left:3px solid var(--amber);  background:linear-gradient(135deg,rgba(217,119,6,.04) 0%,#fff 45%);}
.vbub.v-info{border-left:3px solid var(--blue);   background:linear-gradient(135deg,rgba(45,107,228,.04) 0%,#fff 45%);}
.vbub.v-def {border-left:3px solid var(--def);    background:linear-gradient(135deg,rgba(30,58,138,.04) 0%,#fff 45%);}

.vbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:10px;}
.vb-yes {background:var(--green-l); color:var(--green);}
.vb-no  {background:var(--red-l);   color:var(--red);}
.vb-unk {background:var(--amber-l); color:var(--amber);}
.vb-info,.vb-ctx{background:var(--blue-lt);color:var(--blue);}
.vb-def {background:var(--def-l);   color:var(--def); border:1px solid rgba(30,58,138,.2);}

.verdict-line{font-size:14px;line-height:1.65;color:var(--txt);font-weight:500;}
.full-a{margin-top:13px;padding-top:12px;border-top:1px solid rgba(45,107,228,.1);font-size:13px;line-height:1.78;color:var(--txt2);}
.full-a.collapsed{display:none;}
.fa-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:10px;font-weight:600;color:var(--blue);cursor:pointer;}
.fa-toggle:hover{opacity:.7;}
.expand-meta{margin-top:10px;font-size:10px;color:var(--txt4);display:flex;align-items:center;gap:7px;}
.em-dot{width:3px;height:3px;border-radius:50%;background:var(--txt4);}

.deferred-chip{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 12px;
  border-radius:8px;background:var(--def-lt);border:1px solid rgba(30,58,138,.18);}
.deferred-chip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--def);opacity:.7;}
.deferred-chip-date{font-size:12px;font-weight:700;color:var(--def);font-family:var(--mono);}

.reg-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.reg-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;
  font-size:10px;font-weight:700;border:1px solid transparent;}
.reg-chip-applies  {background:var(--green-l);color:var(--green); border-color:rgba(5,150,105,.2);}
.reg-chip-deferred {background:var(--def-l);  color:var(--def);   border-color:rgba(30,58,138,.2);}
.reg-chip-no       {background:var(--red-l);  color:var(--red);   border-color:rgba(220,38,38,.15);}
.reg-chip-unk      {background:var(--amber-l);color:var(--amber); border-color:rgba(217,119,6,.15);}
.reg-chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

/* ── COLLAPSIBLE SECTIONS ────────────────────────────────── */
.sec-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:9px;cursor:pointer;background:rgba(255,255,255,.65);border:1px solid var(--bdr);transition:.12s;user-select:none;backdrop-filter:blur(8px);}
.sec-toggle:hover{background:var(--blue-lt);border-color:var(--bdr2);}
.sec-lbl{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:600;color:var(--txt2);}
.sec-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pip-blue{background:var(--blue);}
.pip-green{background:var(--green);}
.pip-def{background:var(--def);}
.sec-right{display:flex;align-items:center;gap:8px;}
.sec-tag{font-size:9px;font-weight:700;color:var(--txt4);font-family:var(--mono);}
.sec-arr{font-size:9px;color:var(--txt4);transition:transform .2s;}
.sec-arr.open{transform:rotate(180deg);}
.sec-body{display:none;flex-direction:column;gap:7px;padding:3px 0 2px;}
.sec-body.open{display:flex;}

/* ── ASSESSMENT TABLE ─────────────────────────────────────── */
.atbl-wrap{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);width:100%;}
.atbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
.atbl thead th{padding:7px 11px;background:var(--cloud1);border-bottom:1px solid var(--bdr);
  font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--txt4);
  text-align:left;white-space:nowrap;overflow:hidden;}
/* Fixed column widths so nothing overflows */
.atbl colgroup col:nth-child(1){width:22%;}
.atbl colgroup col:nth-child(2){width:18%;}
.atbl colgroup col:nth-child(3){width:18%;}
.atbl colgroup col:nth-child(4){width:24%;}
.atbl colgroup col:nth-child(5){width:18%;}
.atbl tbody tr{border-bottom:1px solid var(--bdr);}
.atbl tbody tr:last-child{border-bottom:none;}
.atbl tbody tr:hover{background:var(--cloud1);}
.atbl td{padding:8px 11px;vertical-align:top;line-height:1.5;overflow:hidden;word-break:break-word;overflow-wrap:break-word;}
.atbl-cat{font-weight:600;color:var(--txt);font-size:11px;}
.atbl-sub{font-size:9.5px;color:var(--txt4);margin-top:2px;}
.atbl-assess{}
.atbl-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  font-size:9px;font-weight:700;white-space:normal;word-break:break-word;}
.ab-yes {background:var(--green-l); color:var(--green);}
.ab-no  {background:var(--red-l);   color:var(--red);}
.ab-unk {background:var(--amber-l); color:var(--amber);}
.ab-def {background:var(--def-l);   color:var(--def);}
.ab-pass{background:rgba(5,150,105,.07);color:var(--green);}
.ab-na  {background:var(--cloud2);  color:var(--txt4);}
.atbl-basis{font-family:var(--mono);font-size:9.5px;color:var(--blue);display:block;word-break:break-all;overflow-wrap:break-word;}
.atbl-reason{font-size:11px;color:var(--txt2);overflow:hidden;word-break:break-word;overflow-wrap:break-word;}
.atbl-outcome{font-size:10.5px;color:var(--txt2);overflow:hidden;word-break:break-word;overflow-wrap:break-word;}
.atbl-section-hdr td{background:var(--cloud2);padding:5px 11px;
  font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--blue);}

/* ── LEGAL CARDS ─────────────────────────────────────────── */
.lc{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.lc-head{padding:7px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--cloud1);}
.lc-lbl{font-size:8px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.12em;}
.lc-lex{padding:2px 9px;border:1px solid rgba(45,107,228,.3);border-radius:20px;font-size:9px;color:var(--blue);text-decoration:none;transition:.12s;font-weight:600;}
.lc-lex:hover{background:var(--blue-lt);}
.lc-body{padding:9px 13px;}
.lc-arts{font-size:12.5px;font-weight:800;color:var(--txt);font-family:var(--mono);}
.lc-desc{font-size:10.5px;color:var(--txt2);margin-top:3px;line-height:1.5;}

/* ── SCOPE ANALYSIS (REASONING) ─────────────────────────── */
.rcard{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.rcard-body{padding:10px 13px;display:flex;flex-direction:column;gap:10px;}
.inst-row{padding-bottom:9px;border-bottom:1px solid rgba(45,107,228,.08);}
.inst-row:last-child{padding-bottom:0;border-bottom:none;}
.inst-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.idot-yes{background:var(--green);box-shadow:0 0 0 2px var(--green-l);}
.idot-no {background:var(--red);  box-shadow:0 0 0 2px var(--red-l);}
.idot-unk{background:var(--amber);box-shadow:0 0 0 2px var(--amber-l);}
.idot-def{background:var(--def);  box-shadow:0 0 0 2px var(--def-l);}
.inst-name{font-size:11px;font-weight:700;color:var(--txt);}
.inst-deferred-tag{margin-left:6px;padding:1px 7px;border-radius:6px;
  font-size:8px;font-weight:700;background:var(--def-lt);color:var(--def);font-family:var(--mono);}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.pill{padding:2px 9px;border-radius:20px;font-size:9.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px;border:1px solid transparent;}
.pill.ok  {background:var(--green-l);color:var(--green);border-color:rgba(5,150,105,.18);}
.pill.fail{background:var(--red-l);  color:var(--red);  border-color:rgba(220,38,38,.14);}
.pill.unk {background:var(--amber-l);color:var(--amber);border-color:rgba(217,119,6,.14);}
.pill.def {background:var(--def-l);  color:var(--def);  border-color:rgba(30,58,138,.18);}
.pill.excl{background:var(--cloud2); color:var(--txt3); border-color:var(--bdr);}
.risk-badge{padding:1px 8px;border-radius:5px;font-size:9px;font-weight:700;background:var(--blue-lt);color:var(--blue);border:1px solid rgba(45,107,228,.2);font-family:var(--mono);}
.risk-badge.ai{background:var(--purple-l);color:var(--purple);border-color:rgba(124,58,237,.2);}
.governing-tag{margin-left:5px;padding:0 6px;border-radius:8px;font-size:8px;font-weight:700;background:var(--blue-lt);color:var(--blue);}
.additional-tag{margin-left:5px;padding:0 6px;border-radius:8px;font-size:8px;font-weight:700;background:var(--purple-l);color:var(--purple);}
.trace-toggle{font-size:9.5px;color:var(--blue);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;padding:1px 0;}
.trace-toggle:hover{opacity:.75;}
.trace-panel{display:none;margin-top:6px;background:var(--cloud1);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;}
.trace-panel.open{display:block;}
.trace-dim-hdr{padding:4px 11px;font-size:8.5px;font-weight:800;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em;background:var(--cloud2);border-bottom:1px solid var(--bdr);}
.trace-entry{padding:6px 11px;border-bottom:1px solid var(--bdr);display:grid;grid-template-columns:16px 1fr;gap:7px;font-size:10.5px;align-items:start;}
.trace-entry:last-child{border-bottom:none;}
.trace-sym{font-weight:800;line-height:1.5;}
.ts-pass{color:var(--green);}.ts-fail{color:var(--red);}.ts-unk{color:var(--amber);}.ts-def{color:var(--def);}
.trace-ev{color:var(--txt);line-height:1.55;}
.trace-note{font-size:9.5px;color:var(--blue);margin-top:2px;}
.trace-cite{font-size:9px;color:var(--txt4);margin-top:1px;font-family:var(--mono);}

.art5-pass{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:3px 10px;
  border-radius:20px;background:var(--green-l);border:1px solid rgba(5,150,105,.18);
  font-size:9.5px;font-weight:600;color:var(--green);}

/* ── OBLIGATIONS TABS ─────────────────────────────────────── */
.ob-tabs-wrap{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.ob-tab-bar{display:flex;border-bottom:1px solid var(--bdr);background:var(--cloud1);}
.ob-tab{padding:7px 14px;font-size:10px;font-weight:700;color:var(--txt3);cursor:pointer;
  border-bottom:2px solid transparent;transition:.12s;user-select:none;}
.ob-tab:hover{color:var(--txt);}
.ob-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--cloud0);}
.ob-panel{display:none;padding:10px 13px;}
.ob-panel.active{display:block;}
.ob-list{display:flex;flex-direction:column;gap:5px;}
.ob-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;
  padding:6px 9px;border-radius:8px;background:var(--cloud1);border:1px solid var(--bdr);}
.ob-item:hover{background:var(--blue-lt);border-color:var(--bdr2);}
.ob-label{font-size:11px;font-weight:600;color:var(--txt);}
.ob-desc{font-size:10px;color:var(--txt3);margin-top:2px;line-height:1.4;}
.ob-art{font-size:9px;font-weight:700;font-family:var(--mono);color:var(--blue);
  padding:1px 7px;border-radius:5px;background:var(--blue-lt);white-space:nowrap;flex-shrink:0;}

/* ── EUR-LEX CHIPS ──────────────────────────────────────── */
.lex-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.lex-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border:1px solid var(--bdr2);border-radius:20px;
  font-size:9.5px;font-weight:600;color:var(--blue);text-decoration:none;
  background:var(--blue-lt);transition:.12s;}
.lex-chip:hover{background:rgba(45,107,228,.15);}

/* ── NEXT STEPS ─────────────────────────────────────────── */
.step-row{display:grid;grid-template-columns:20px 1fr auto;gap:8px;
  align-items:start;padding:7px 0;border-bottom:1px solid var(--bdr);}
.step-row:last-child{border-bottom:none;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--blue);
  color:#fff;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-action{font-size:11.5px;color:var(--txt);line-height:1.5;}
.step-basis{font-size:9.5px;color:var(--txt3);margin-top:2px;font-family:var(--mono);}
.step-timing{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;}
.st-immediate{background:var(--red-l);  color:var(--red);}
.st-before   {background:var(--amber-l);color:var(--amber);}
.st-ongoing  {background:var(--green-l);color:var(--green);}
.st-deferred {background:var(--def-l);  color:var(--def);}

/* ── CANNOT-DETERMINE CARD ──────────────────────────────── */
.cond-card{padding:12px 14px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue-lt),rgba(255,255,255,.8));
  border:1px solid var(--bdr2);}
.cond-title{font-size:8px;font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;color:var(--blue);margin-bottom:8px;}
.cond-scope-row{display:flex;align-items:center;gap:6px;
  padding:4px 0;font-size:11px;color:var(--txt2);}
.cond-scope-row .cs-dim{font-weight:600;color:var(--txt);min-width:90px;}
.cond-if{margin-top:10px;padding:8px 10px;border-radius:8px;
  background:rgba(45,107,228,.06);border:1px solid var(--bdr);
  font-size:11.5px;color:var(--txt2);line-height:1.6;}
.cond-if strong{color:var(--txt);}
.cond-q{margin-top:10px;padding:8px 10px;border-radius:8px;
  background:var(--amber-l);border:1px solid rgba(217,119,6,.2);
  font-size:11.5px;color:#78350f;font-weight:600;}
.trace-overall{margin:10px 10px 8px;padding:10px 12px;border-radius:8px;border:1px solid;}
.trace-overall.overall-pass{background:var(--green-l);border-color:rgba(5,150,105,.2);}
.trace-overall.overall-fail{background:var(--red-l);border-color:rgba(220,38,38,.15);}
.trace-overall.overall-unk{background:var(--amber-l);border-color:rgba(217,119,6,.15);}
.trace-overall.overall-def{background:var(--def-l);border-color:rgba(30,58,138,.2);}
.overall-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.trace-overall.overall-pass .overall-lbl{color:var(--green);}
.trace-overall.overall-fail .overall-lbl{color:var(--red);}
.trace-overall.overall-unk  .overall-lbl{color:var(--amber);}
.trace-overall.overall-def  .overall-lbl{color:var(--def);}
.overall-text{font-size:11px;line-height:1.65;color:var(--txt2);}

/* ── SOURCES ─────────────────────────────────────────────── */
.src-toggle{padding:4px 11px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,.6);font-size:10px;color:var(--txt3);cursor:pointer;font-family:var(--font);transition:.12s;font-weight:500;}
.src-toggle:hover{background:var(--blue-lt);color:var(--blue);}
.src-list{display:none;margin-top:6px;padding:9px 11px;border:1px solid var(--bdr);border-radius:9px;background:var(--cloud0);}
.src-list.open{display:block;}
.src-item{padding:5px 0;border-bottom:1px solid var(--bdr);font-size:10.5px;}
.src-item:last-child{border-bottom:none;}
.src-title{font-weight:700;color:var(--txt);}
.src-score{color:var(--txt4);margin-left:6px;font-family:var(--mono);font-size:10px;}
.src-text{color:var(--txt2);margin-top:2px;line-height:1.45;font-size:10px;}

/* ── LOADING ─────────────────────────────────────────────── */
.ldots{display:flex;gap:4px;align-items:center;}
.ld{width:6px;height:6px;background:var(--cloud4);border-radius:50%;animation:bounce 1.1s infinite;}
.ld:nth-child(2){animation-delay:.18s;}.ld:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.ld-status{font-size:10.5px;color:var(--txt4);font-style:italic;margin-left:10px;}

/* ── ACTIONS ─────────────────────────────────────────────── */
#acts{padding:8px 22px;border-top:1px solid var(--bdr);display:none;flex-wrap:wrap;gap:6px;flex-shrink:0;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);}
.act{padding:6px 15px;border-radius:20px;font-size:11.5px;cursor:pointer;font-family:var(--font);border:none;transition:.12s;font-weight:600;}
.act.pri{background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;box-shadow:0 2px 8px rgba(45,107,228,.25);}
.act.pri:hover{transform:translateY(-1px);}
.act.sec{background:rgba(255,255,255,.8);color:var(--txt);border:1px solid var(--bdr);}
.act.sec:hover{background:var(--blue-lt);border-color:var(--bdr2);}

/* ── INPUT ───────────────────────────────────────────────── */
#inbar{padding:10px 22px 14px;border-top:1px solid var(--bdr);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;background:rgba(255,255,255,.78);backdrop-filter:blur(20px);}
#cin{flex:1;padding:11px 15px;border:1.5px solid var(--bdr2);border-radius:12px;font-size:13px;color:var(--txt);outline:none;resize:none;font-family:var(--font);line-height:1.4;max-height:100px;overflow-y:auto;background:var(--cloud0);transition:.15s;font-weight:500;}
#cin::placeholder{color:var(--txt4);font-weight:400;}
#cin:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,107,228,.1);}
#sbtn{padding:11px 20px;background:linear-gradient(135deg,var(--blue-dk),var(--blue));color:#fff;border:none;border-radius:12px;font-size:13px;cursor:pointer;font-family:var(--font);flex-shrink:0;font-weight:700;transition:.15s;box-shadow:0 2px 10px rgba(45,107,228,.28);}
#sbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(45,107,228,.35);}
#sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── WELCOME ─────────────────────────────────────────────── */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.wt{font-size:14px;font-weight:500;color:var(--txt2);margin-top:14px;margin-bottom:5px;}
.ws{font-size:13px;max-width:360px;line-height:1.7;color:var(--txt3);}
.hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px;max-width:540px;}
.hint{padding:12px 14px;border:1px solid var(--bdr);border-radius:11px;font-size:12px;color:var(--txt2);text-align:left;cursor:pointer;background:rgba(255,255,255,.75);font-family:var(--font);backdrop-filter:blur(12px);transition:.15s;font-weight:500;box-shadow:var(--sh-xs);}
.hint:hover{border-color:var(--blue);background:var(--cloud0);box-shadow:0 0 0 3px rgba(45,107,228,.08),var(--sh-xs);transform:translateY(-1px);}
.hint-l{font-size:8.5px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.hint-full{grid-column:1/-1;}

/* ── STAGE ─────────────────────────────────────────────── */
.stage-wrap{display:flex;flex-direction:column;gap:8px;}
.stage-bub{background:var(--cloud0);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;padding:15px 18px;box-shadow:var(--sh-md);border-left:3px solid var(--blue);}
.stage-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:10px;background:var(--blue-lt);color:var(--blue);}
.stage-verdict{font-size:14px;line-height:1.65;color:var(--txt);font-weight:500;margin-bottom:10px;}
.sig-grid{display:flex;flex-direction:column;gap:5px;margin:10px 0;}
.sig-row{display:grid;grid-template-columns:120px 80px 1fr;gap:10px;align-items:start;padding:7px 11px;border-radius:8px;background:var(--cloud1);border:1px solid var(--bdr);font-size:11.5px;}
.sig-inst{font-weight:700;color:var(--txt);}
.sig-signal{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.sig-yes{background:var(--green-l);color:var(--green);}
.sig-no{background:var(--red-l);color:var(--red);}
.sig-unk{background:var(--amber-l);color:var(--amber);}
.sig-reason{font-size:11px;color:var(--txt2);line-height:1.45;}
.stage-ask{margin-top:6px;padding:11px 14px;border-radius:10px;background:var(--blue-lt);border:1px solid var(--bdr2);}
.stage-ask-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:8px;}
.stage-ask-list{display:flex;flex-direction:column;gap:4px;}
.stage-ask-item{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:var(--txt2);line-height:1.5;}
.stage-ask-num{min-width:18px;height:18px;background:var(--blue);color:#fff;border-radius:50%;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.stage-q-block{margin-top:6px;padding:10px 14px;border-radius:10px;background:var(--amber-l);border:1px solid rgba(217,119,6,.2);}
.stage-q-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#92400e;margin-bottom:7px;}
.stage-q-item{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:#78350f;line-height:1.5;padding:3px 0;font-weight:500;}
.stage-q-num{min-width:18px;height:18px;background:#d97706;color:#fff;border-radius:50%;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.stage-doc-req{font-size:11px;color:#78350f;font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid rgba(217,119,6,.2);}
.prelim-reg-card{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.prelim-reg-hdr{padding:7px 13px;border-bottom:1px solid var(--bdr);background:var(--cloud1);display:flex;align-items:center;justify-content:space-between;}
.prelim-reg-name{font-size:10px;font-weight:800;color:var(--txt);text-transform:uppercase;letter-spacing:.08em;}
.prelim-reg-signal{font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:20px;}
.prelim-reg-body{padding:10px 13px;}
.prelim-analysis{font-size:12px;line-height:1.7;color:var(--txt2);margin-bottom:6px;}
.prelim-remains{font-size:10.5px;color:var(--txt3);font-style:italic;padding-top:5px;border-top:1px dashed var(--bdr);}
.prelim-gap-list{padding:9px 13px;background:var(--cloud1);border:1px solid var(--bdr);border-radius:var(--r);}
.prelim-gap-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--txt4);margin-bottom:6px;}
.prelim-gap-item{font-size:11px;color:var(--txt2);line-height:1.5;padding:3px 0;display:flex;gap:7px;}
.prelim-gap-item::before{content:"→";color:var(--txt4);flex-shrink:0;}
.prelim-next-q{padding:9px 13px;background:linear-gradient(135deg,var(--blue-lt),rgba(255,255,255,.9));border:1px solid var(--bdr2);border-radius:var(--r);font-size:11.5px;color:var(--txt2);line-height:1.6;}
.prelim-next-q strong{color:var(--blue);}

/* ── VERDICT CARD ─────────────────────────────────────────── */
.verdict-card{background:var(--cloud0);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;padding:18px 20px;box-shadow:var(--sh-md);}
.verdict-card.v-yes{border-left:3px solid var(--green);background:linear-gradient(135deg,rgba(5,150,105,.03) 0%,#fff 50%);}
.verdict-card.v-no{border-left:3px solid var(--red);background:linear-gradient(135deg,rgba(220,38,38,.03) 0%,#fff 50%);}
.verdict-card.v-unk{border-left:3px solid var(--amber);background:linear-gradient(135deg,rgba(217,119,6,.03) 0%,#fff 50%);}
.verdict-card.v-def{border-left:3px solid var(--def);background:linear-gradient(135deg,rgba(30,58,138,.03) 0%,#fff 50%);}
.verdict-card.v-info{border-left:3px solid var(--blue);background:linear-gradient(135deg,rgba(45,107,228,.03) 0%,#fff 50%);}
.vc-verdict-line{font-size:14px;font-weight:500;color:var(--txt);line-height:1.65;margin:8px 0 10px;}
.vc-analysis{font-size:13px;color:var(--txt2);line-height:1.78;}
.vc-more{display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(45,107,228,.1);font-size:13px;color:var(--txt2);line-height:1.78;}
.vc-expand{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;}
.vc-expand:hover{opacity:.7;}
.vc-lex{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(45,107,228,.09);}
.vc-lex-link{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border:1px solid var(--bdr2);border-radius:20px;font-size:10px;font-weight:600;color:var(--blue);text-decoration:none;background:var(--blue-lt);transition:.12s;}
.vc-lex-link:hover{background:rgba(45,107,228,.14);}
.vc-sep{height:1px;background:var(--bdr);margin:14px 0;}

/* ── REGULATION TABS ──────────────────────────────────────── */
.reg-tab-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.reg-tab-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:24px;border:1px solid var(--bdr);background:rgba(255,255,255,.7);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;color:var(--txt3);transition:.12s;backdrop-filter:blur(8px);}
.reg-tab-btn:hover{background:var(--blue-lt);border-color:var(--bdr2);}
.reg-tab-btn.rtb-active-gdpr{background:#185FA5;color:#fff;border-color:#185FA5;}
.reg-tab-btn.rtb-active-mdr{background:#27500A;color:#fff;border-color:#27500A;}
.reg-tab-btn.rtb-active-aia{background:#3C3489;color:#fff;border-color:#3C3489;}
.reg-tab-btn.rtb-active-gdpr .rtb-dot{background:rgba(255,255,255,.5);}
.reg-tab-btn.rtb-active-mdr .rtb-dot{background:rgba(255,255,255,.5);}
.reg-tab-btn.rtb-active-aia .rtb-dot{background:rgba(255,255,255,.5);}
.rtb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rtb-gdpr .rtb-dot{background:#185FA5;}
.rtb-mdr .rtb-dot{background:#27500A;}
.rtb-aia .rtb-dot{background:#3C3489;}
.rtb-pill{font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:20px;}
.rtb-pill-ok{background:#EAF3DE;color:#27500A;}
.rtb-pill-def{background:#E6F1FB;color:#0C447C;}
.rtb-pill-no{background:#FCEBEB;color:#791F1F;}
.rtb-pill-unk{background:#FAEEDA;color:#633806;}
.reg-tab-btn.rtb-active-gdpr .rtb-pill,.reg-tab-btn.rtb-active-mdr .rtb-pill,.reg-tab-btn.rtb-active-aia .rtb-pill{background:rgba(255,255,255,.2);color:#fff;}

/* ── TRACE PANEL (tab content) ───────────────────────────── */
.trace-panel-wrap{background:var(--cloud0);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);}
.trace-dim-row{display:grid;grid-template-columns:130px 130px 1fr;border-bottom:1px solid var(--bdr);}
.trace-dim-row:last-child{border-bottom:none;}
.tdr-dim{padding:10px 14px;border-right:1px solid var(--bdr);}
.tdr-dim-name{font-size:12px;font-weight:700;color:var(--txt);}
.tdr-dim-art{font-size:9.5px;color:var(--txt4);font-family:var(--mono);margin-top:2px;}
.tdr-badge{padding:10px 12px;border-right:1px solid var(--bdr);display:flex;align-items:flex-start;padding-top:12px;}
.tdr-detail{padding:10px 14px;overflow:hidden;word-break:break-word;}
.tdr-reason{font-size:11.5px;color:var(--txt2);line-height:1.65;margin-bottom:3px;}
.tdr-cite{font-size:9.5px;color:var(--txt4);font-family:var(--mono);word-break:break-all;}
.tdr-badge-ok{background:var(--green-l);color:var(--green);border:1px solid rgba(5,150,105,.2);display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:normal;word-break:break-word;}
.tdr-badge-def{background:var(--def-lt);color:var(--def);border:1px solid rgba(30,58,138,.2);display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:normal;word-break:break-word;}
.tdr-badge-no{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.15);display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:normal;word-break:break-word;}
.tdr-badge-unk{background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2);display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:normal;word-break:break-word;}
.trace-overall-row{padding:9px 14px;background:var(--cloud1);display:flex;align-items:center;gap:10px;border-top:1px solid var(--bdr);}
.tor-note{font-size:11px;color:var(--txt4);line-height:1.5;flex:1;}
.deferred-prep{margin-top:8px;padding:9px 13px;border-radius:9px;background:var(--def-lt);border:1px solid rgba(30,58,138,.2);}
.dp-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--def);margin-bottom:4px;}
.dp-text{font-size:11px;color:#4338ca;line-height:1.6;}

/* ── RICH TEXT (numbered lists, bullets, paragraphs) ─────── */
.rich-ol,.rich-ul{margin:6px 0 6px 18px;display:flex;flex-direction:column;gap:5px;}
.rich-ol{list-style:decimal;}
.rich-ul{list-style:disc;}
.rich-ol li,.rich-ul li{font-size:12.5px;color:var(--txt2);line-height:1.65;padding-left:2px;}
.rich-ol li strong,.rich-ul li strong{color:var(--txt);}
.rich-p{font-size:13px;color:var(--txt2);line-height:1.78;margin:4px 0;}
.rich-p:empty{display:none;}

/* ── OBLIGATIONS CARD ────────────────────────────────────── */
.ob-card{background:var(--cloud0);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;
  box-shadow:var(--sh-md);border-left:3px solid var(--blue);overflow:hidden;}
.ob-card-head{padding:14px 18px 12px;}
.ob-card-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:10px;
  background:var(--blue-lt);color:var(--blue);}
.ob-card-title{font-size:14px;font-weight:500;color:var(--txt);line-height:1.6;margin-bottom:4px;}
.ob-card-sub{font-size:11.5px;color:var(--txt3);margin-bottom:10px;}
/* Collapsible toggle row */
.ob-toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 18px;background:var(--cloud1);border-top:1px solid var(--bdr);
  cursor:pointer;user-select:none;transition:.12s;}
.ob-toggle-row:hover{background:var(--blue-lt);}
.ob-toggle-lbl{font-size:11px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;}
.ob-toggle-count{padding:1px 8px;border-radius:20px;background:var(--blue-lt);color:var(--blue);
  font-size:9.5px;font-weight:700;font-family:var(--mono);}
.ob-toggle-arr{font-size:10px;color:var(--txt4);transition:transform .2s;}
.ob-toggle-arr.open{transform:rotate(180deg);}
/* List body */
.ob-list-body{display:none;padding:4px 0 8px;}
.ob-list-body.open{display:block;}
.ob-list-item{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start;
  padding:9px 18px;border-bottom:1px solid rgba(45,107,228,.06);}
.ob-list-item:last-child{border-bottom:none;}
.ob-list-item:hover{background:var(--cloud1);}
.ob-list-num{width:22px;height:22px;border-radius:50%;background:var(--blue-lt);color:var(--blue);
  font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-family:var(--mono);}
.ob-list-text{font-size:12px;color:var(--txt2);line-height:1.6;}
.ob-list-text strong{color:var(--txt);}
/* Article citation chip inside list item */
.ob-art-chip{display:inline-flex;align-items:center;margin-left:6px;padding:1px 7px;
  border-radius:5px;background:var(--blue-lt);color:var(--blue);
  font-size:9px;font-weight:700;font-family:var(--mono);border:1px solid rgba(45,107,228,.2);}
/* Action proposals */
.ob-actions{padding:12px 18px;border-top:1px solid var(--bdr);background:var(--cloud1);
  display:flex;gap:8px;flex-wrap:wrap;}
.ob-action-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:20px;border:1px solid var(--bdr2);background:var(--cloud0);
  font-family:var(--font);font-size:11.5px;font-weight:600;cursor:pointer;
  color:var(--txt2);transition:.12s;}
.ob-action-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);}
.ob-action-btn.primary{background:linear-gradient(135deg,var(--blue-dk),var(--blue));

// ── POLYGON BACKGROUND ────────────────────────────────────────────
(function(){
  const svg=document.getElementById("poly-bg");
  const W=window.innerWidth,H=window.innerHeight;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const cols=14,rows=9,pts=[];
  for(let r=0;r<=rows;r++)
    for(let c=0;c<=cols;c++)
      pts.push([(c/cols)*W+(Math.random()-.5)*W/cols*.6,(r/rows)*H+(Math.random()-.5)*H/rows*.6]);
  [[0,0],[W,0],[W,H],[0,H],[W/2,0],[W/2,H],[0,H/2],[W,H/2]].forEach(p=>pts.push(p));
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=r*(cols+1)+c;
      [[i,i+1,i+cols+1],[i+1,i+cols+2,i+cols+1]].forEach(tri=>{
        if(!pts[tri[0]]||!pts[tri[1]]||!pts[tri[2]]) return;
        const poly=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.setAttribute("points",tri.map(j=>`${clamp(pts[j][0],0,W).toFixed(1)},${clamp(pts[j][1],0,H).toFixed(1)}`).join(" "));
        const h=208+Math.floor(Math.random()*18),l=93+Math.floor(Math.random()*6);
        const a=(0.28+Math.random()*0.42).toFixed(2);
        poly.setAttribute("fill",`hsla(${h},50%,${l}%,${a})`);
        poly.setAttribute("stroke",`hsla(${h},40%,80%,0.3)`);
        poly.setAttribute("stroke-width","0.5");
        svg.appendChild(poly);
      });
    }
  }
})();

// ── CONFIG ────────────────────────────────────────────────────────

// ── STATE ─────────────────────────────────────────────────────────
let SESSION_ID=crypto.randomUUID(),msgs=[],sessions=[],activeSess="new",msgCount=0,loading=false,midN=0;

// ── UTILS ─────────────────────────────────────────────────────────
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmt=s=>s?esc(s).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>"):"";

// Strip JSON artifact wrapper the backend sometimes injects into full_analysis.
// Strategy: find the first "N. " or "N) " numbered item and take everything from there.
function sanitizeAnalysis(raw){
  if(!raw) return "";
  let s = String(raw).trim();

  // Find first numbered list item: looks for \n1. or standalone 1. at start
  const listStart = s.search(/(?:^|\n)\s*1[.)]\s+\S/);
  if(listStart !== -1){
    // Take from "1." onwards
    const cut = s.slice(listStart).trim();
    // If there was a preamble sentence before the list, prepend it
    // by extracting the last plain sentence before the JSON/list block
    const before = s.slice(0, listStart).trim();
    // Strip JSON-like prefix from the preamble
    const cleanBefore = before
      .replace(/^\{[\s\S]*?"session_title"\s*:\s*"[^"]*"\s*/i, "")
      .replace(/^\{[\s\S]*?"full_analysis"\s*:\s*"([^"]*)"\s*/i, "$1")
      .replace(/^\{[^}]*\}\s*/s, "")
      .replace(/^\{.*$/m, "")
      .trim();
    return (cleanBefore ? cleanBefore + "\n" : "") + cut;
  }

  // No numbered list found — just strip JSON wrapper
  s = s.replace(/^\{[\s\S]*?"session_title"\s*:\s*"[^"]*"\s*/i, "");
  s = s.replace(/^\{[\s\S]*?"full_analysis"\s*:\s*"([^"]*)"\s*/i, "$1");
  s = s.replace(/^\{[^}]{0,400}\}\s*/s, "");
  s = s.replace(/\}\s*$/, "").trim();
  return s;
}

// Rich formatter: renders numbered lists as <ol>, bullet lists as <ul>, bold, line breaks
function fmtRich(raw){
  if(!raw) return "";
  const s = sanitizeAnalysis(raw);

  // Split on real newlines; also split on \n literals in case they're escaped in the string
  const lines = s.replace(/\\n/g, "\n").split(/\n/);

  let html = "";
  let inOl = false, inUl = false;

  const closeLists = () => {
    if(inOl){ html += "</ol>"; inOl = false; }
    if(inUl){ html += "</ul>"; inUl = false; }
  };

  const fmtLine = t => {
    // Strip leading/trailing stray quotes or braces left from JSON
    t = t.replace(/^["{\s]+/, "").replace(/[}"]+\s*$/, "").trim();
    return esc(t)
      .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.*?)\*/g,"<em>$1</em>");
  };

  for(let raw of lines){
    // Strip leading quote artifact e.g. "1. foo → 1. foo
    let line = raw.replace(/^["]+/, "").trim();
    // Skip empty
    if(!line || line === "}" || line === "{"){
      if(!line) { closeLists(); }
      continue;
    }

    // Numbered list: "1. " or "1) " (with optional leading quote already stripped)
    const numMatch = line.match(/^(\d+)[.)]\s+(.+)$/);
    if(numMatch){
      if(!inOl){ closeLists(); html += '<ol class="rich-ol">'; inOl = true; }
      // Extract optional bold title before colon: **Title**: rest
      const content = numMatch[2];
      const boldTitle = content.match(/^\*\*(.+?)\*\*:\s*(.*)$/);
      if(boldTitle){
        html += `<li><strong>${esc(boldTitle[1])}</strong>: ${esc(boldTitle[2].replace(/[}"]+\s*$/,"").trim())}</li>`;
      } else {
        html += `<li>${fmtLine(content)}</li>`;
      }
      continue;
    }

    // Bullet list: "- " or "• "
    const bulMatch = line.match(/^[-•]\s+(.+)$/);
    if(bulMatch){
      if(!inUl){ closeLists(); html += '<ul class="rich-ul">'; inUl = true; }
      html += `<li>${fmtLine(bulMatch[1])}</li>`;
      continue;
    }

    // Plain paragraph
    closeLists();
    const cleaned = fmtLine(line);
    if(cleaned) html += `<p class="rich-p">${cleaned}</p>`;
  }
  closeLists();
  return html;
}

// ── STAGE RENDERS ─────────────────────────────────────────────────
function signalCls(s){
  const sl=(s||"").toLowerCase();
  if(sl.includes("likely yes")||sl.includes("likely in scope")||sl.includes("strong"))return"sig-yes";
  if(sl.includes("likely no")||sl.includes("unlikely"))return"sig-no";
  return"sig-unk";
}

function renderIndicative(n){
  const bullets=n.indicative_bullets||[];
  const docs=n.document_requests||[];
  const qs=n.threshold_questions||[];
  const bulletRows=bullets.map(b=>`
    <div class="sig-row">
      <span class="sig-inst">${esc(b.instrument||b.instrument_id||"")}</span>
      <span class="sig-signal ${signalCls(b.signal)}">${esc(b.signal||"")}</span>
      <span class="sig-reason">${esc(b.reason||"")}</span>
    </div>`).join("");
  const docItems=docs.map((d,i)=>`<div class="stage-ask-item"><div class="stage-ask-num">${i+1}</div>${esc(d)}</div>`).join("");
  window._stageQs=qs;
  const qItems=qs.map((q,i)=>`<div class="stage-q-item" style="cursor:pointer;" onclick="stageAsk(${i})"><div class="stage-q-num">${i+1}</div>${esc(q)}</div>`).join("");
  return`<div class="stage-wrap">
    <div class="stage-bub">
      <div class="stage-badge">◎ Indicative assessment</div>
      <div class="stage-verdict">${fmt(n.verdict_line||"")}</div>
      ${n.opening?`<div style="font-size:11.5px;color:var(--txt3);margin-bottom:8px;">${esc(n.opening)}</div>`:""}
      <div class="sig-grid">${bulletRows}</div>
    </div>
    ${docs.length?`<div class="stage-ask">
      <div class="stage-ask-title">Documents that would help — provide any that are available</div>
      <div class="stage-ask-list">${docItems}</div>
    </div>`:""}
    ${qs.length?`<div class="stage-q-block">
      <div class="stage-q-title">Please answer these threshold questions</div>
      ${qItems}
    </div>`:""}
  </div>`;
}

function renderGathering(n){
  const bullets=n.indicative_bullets||[];
  const qs=n.focused_questions||[];
  const docReq=n.document_excerpt_request||"";
  const ack=n.acknowledgement||"";
  const bulletRows=bullets.map(b=>`
    <div class="sig-row">
      <span class="sig-inst">${esc(b.instrument||b.instrument_id||"")}</span>
      <span class="sig-signal ${signalCls(b.signal)}">${esc(b.signal||"")}</span>
      <span class="sig-reason">${esc(b.reason||"")}</span>
    </div>`).join("");
  window._stageQs=qs;
  const qItems=qs.map((q,i)=>`<div class="stage-q-item" style="cursor:pointer;" onclick="stageAsk(${i})"><div class="stage-q-num">${i+1}</div>${esc(q)}</div>`).join("");
  return`<div class="stage-wrap">

      ${qItems}
      ${docReq?`<div class="stage-doc-req">${esc(docReq)}</div>`:""}

}

function renderPreliminary(n){
  const regs=n.per_regulation||[];
  const gaps=n.remaining_gaps||[];
  const nextQ=n.next_prompt||"";
  const SIG_CLS={"likely yes":"sig-yes","likely in scope":"sig-yes","likely no":"sig-no"};
  const regCards=regs.map(r=>{
    const sc=SIG_CLS[(r.indicative_verdict||"").toLowerCase()]||"sig-unk";
    return`<div class="prelim-reg-card">
      <div class="prelim-reg-hdr">
        <span class="prelim-reg-name">${esc(r.instrument||r.instrument_id||"")}</span>
        <span class="sig-signal ${sc}">${esc(r.indicative_verdict||"")}</span>
      </div>
      <div class="prelim-reg-body">
        <div class="prelim-analysis">${fmt(r.analysis||"")}</div>
        ${r.what_remains?`<div class="prelim-remains">Still needed: ${esc(r.what_remains)}</div>`:""}
      </div>
    </div>`;
  }).join("");
  const gapItems=gaps.map(g=>`<div class="prelim-gap-item">${esc(g)}</div>`).join("");
  return`<div class="stage-wrap">
    <div class="stage-bub">

// Deep-extract content from malformed backend responses.
// The backend sometimes concatenates a JSON header with the actual list content
// producing strings like: { "verdict_line": "...", "full_analysis": "preamble" 1. Item...
function normalizeBackendResponse(data){
  if(!data) return data;
  const n = data.narrative;
  if(!n) return data;

  // Helper: extract numbered list items from ANY string, however mangled
  function extractListItems(raw){
    if(!raw) return [];
    const s = String(raw).replace(/\\n/g,"\n");
    const items = [];
    // Match patterns: 1. text, 1) text, "1. text, even mid-string
    const rx = /(?:^|[\n"]\s*)(\d+)[.)]\s+([^\n"]+)/gm;
    let m;
    while((m = rx.exec(s)) !== null){
      const text = m[2].replace(/["}\s]+$/,"").trim();
      if(text) items.push({num: parseInt(m[1]), text});
    }
    // Deduplicate by num, keep first occurrence
    const seen = new Set();
    return items.filter(i => { if(seen.has(i.num)) return false; seen.add(i.num); return true; });
  }

  // Helper: extract a clean preamble sentence from a JSON-contaminated string
  function extractPreamble(raw){
    if(!raw) return "";
    const s = String(raw).trim();
    // Pull value of "full_analysis" key if present
    const m = s.match(/"full_analysis"\s*:\s*"([^"]+)"/i);
    if(m) return m[1].trim();
    // Or "verdict_line" value if full_analysis not found
    const m2 = s.match(/"verdict_line"\s*:\s*"([^"]+)"/i);
    if(m2) return m2[1].trim();
    // Strip JSON prefix and return first sentence
    const stripped = s.replace(/^\{[^}]{0,600}\}\s*/s,"").trim();
    const firstLine = stripped.split(/\n/)[0].replace(/^["{\s]+/,"").replace(/[}"]+$/,"").trim();
    return firstLine.match(/^\d+[.)]/) ? "" : firstLine; // don't return a list item as preamble
  }

  const fa = String(n.full_analysis || "").trim();
  const vl = String(n.verdict_line || "").trim();

  // Case 1: full_analysis looks like placeholder or is very short / generic
  const isPlaceholder = /^(numbered steps|key obligations|here is|the following|below are|obligations include)/i.test(fa)
    || fa.length < 60;

  // Case 2: full_analysis or verdict_line contains embedded JSON blob
  const hasJsonBlob = fa.startsWith("{") || vl.startsWith("{");

  // Collect list items from ALL available string fields in the response
  const allText = [
    fa, vl,
    String(data.answer||""),
    // Sometimes the whole response payload gets stringified into one field
  ].join("\n");

  const items = extractListItems(allText);

  if(items.length > 0){
    // We found actual list content — store it for the renderer
    n._extracted_list = items;
    // Fix the preamble
    if(isPlaceholder || hasJsonBlob){
      const preamble = extractPreamble(fa) || extractPreamble(vl);
      n.full_analysis = preamble || fa;
    }
  }

  // Fix verdict_line if it contains a JSON blob
  if(hasJsonBlob){
    const m = vl.match(/"verdict_line"\s*:\s*"([^"]+)"/i);
    if(m) n.verdict_line = m[1];
    else n.verdict_line = vl.replace(/^\{[^}]{0,400}\}\s*/s,"").split("\n")[0]
      .replace(/^["{\s]+/,"").replace(/[}"]+$/,"").trim() || "Here are the key obligations:";
  }

  return data;
}

// ── TRACE RENDERER ────────────────────────────────────────────────
function renderTracePanel(iid,result,panelId){
  const trace=result.trace||[];if(!trace.length) return "";
  const dims={};
  let overallEntry=null;
  for(const e of trace){
    const d=e.dimension||"other";
    if(d==="overall"){overallEntry=e;continue;}
    (dims[d]=dims[d]||[]).push(e);
  }
  const ORDER=["temporal","territorial","material","exclusion"];
  const DLBL={temporal:"Temporal scope",territorial:"Territorial scope",material:"Material scope",exclusion:"Exclusions & checks"};
  const SYM={pass:"✓",fail:"✗",cannot_determine:"–",prohibited:"⛔",not_reached:"–",deferred:"⏳"};
  const CLS={pass:"ts-pass",fail:"ts-fail",cannot_determine:"ts-unk",prohibited:"ts-fail",not_reached:"ts-unk",deferred:"ts-def"};
  let html=`<div id="${panelId}" class="trace-panel">`;
  for(const dim of ORDER){
    const entries=dims[dim];if(!entries?.length) continue;
    html+=`<div class="trace-dim-hdr">${DLBL[dim]||dim}</div>`;
    for(const e of entries){
      const r=e.result||"cannot_determine";
      const ev=esc(e.evidence||"");
      const rawCites=(e.citations||[]).slice(0,3);
      const cites=rawCites.map(c=>esc(c)).join("; ");
      const note=esc(e.note||"");
      html+=`<div class="trace-entry">
        <span class="trace-sym ${CLS[r]||"ts-unk"}">${SYM[r]||"–"}</span>
        <div>
          <div class="trace-ev">${ev}</div>
          ${cites?`<div class="trace-cite">${cites}</div>`:""}
          ${note?`<div class="trace-note">→ ${note}</div>`:""}
        </div>
      </div>`;
    }
  }
  if(overallEntry){
    const r=overallEntry.result||"cannot_determine";
    const overallCls=r==="pass"?"overall-pass":r==="deferred"?"overall-def":r==="fail"?"overall-fail":"overall-unk";
    const overallLbl=r==="pass"?"Regulation applies":r==="deferred"?"In scope — obligations deferred":r==="fail"?"Regulation does not apply":"Cannot determine";
    html+=`<div class="trace-overall ${overallCls}">
      <div class="overall-lbl">${overallLbl}</div>
      <div class="overall-text">${fmt(overallEntry.evidence||"")}</div>
    </div>`;
  }
  return html+"</div>";
}

// ── SCOPE PILLS ───────────────────────────────────────────────────
function renderScopePills(iid,sd,result){
  const scope=result.scope||{};let pills="";
  for(const d of ["temporal","territorial","material"]){
    const r=scope[d];if(!r||r==="not_reached")continue;
    const cls=r==="pass"?"ok":r==="fail"?"fail":r==="deferred"?"def":"unk";
    const sym=r==="pass"?"✓":r==="fail"?"✗":r==="deferred"?"⏳":"?";
    pills+=`<span class="pill ${cls}">${d[0].toUpperCase()+d.slice(1)} ${sym}</span>`;
  }
  const excl=(sd||{})[iid]?.exclusion_triggered===true;
  pills+=`<span class="pill excl">Excl. ${excl?"Triggered":"None"}</span>`;
  const cats=((sd||{})[iid]?.risk_categories)||[];
  const L={high_risk_annex_III:"Annex III",high_risk_annex_I_sector_products:"Annex I",GPAI_model:"GPAI",prohibited:"Prohibited"};
  if(cats.length>1) cats.forEach(c=>pills+=`<span class="risk-badge${c.includes("annex_I_sector")?" ai":""}">${L[c]||c}</span>`);
  else if((sd||{})[iid]?.risk_category) pills+=`<span class="risk-badge">${L[(sd||{})[iid].risk_category]||(sd||{})[iid].risk_category}</span>`;
  return pills;
}

// ── OBLIGATIONS TABS ──────────────────────────────────────────────
function renderObligationTabs(obligations,wrapId){
  if(!obligations||!Object.keys(obligations).length) return "";
  const roles=Object.keys(obligations);
  if(!roles.length) return "";
  const ROLE_LABEL={provider:"Provider obligations",deployer:"Deployer obligations",manufacturer:"Manufacturer obligations"};
  let tabsHtml=roles.map((r,i)=>`<div class="ob-tab${i===0?" active":""}" data-role="${r}" onclick="switchObTab(document.getElementById('${wrapId}'),'${r}')">${ROLE_LABEL[r]||r} <span style="font-family:var(--mono);font-size:8px;color:var(--txt4)">(${obligations[r].length})</span></div>`).join("");
  let panelsHtml=roles.map((r,i)=>{
    const items=obligations[r]||[];
    const itemsHtml=items.map(ob=>{
      const label=ob.label||ob;
      const desc=ob.description||"";
      const art=ob.article||"";
      return`<div class="ob-item">
        <div><div class="ob-label">${esc(label)}</div>${desc?`<div class="ob-desc">${esc(desc.slice(0,100))}${desc.length>100?"…":""}</div>`:""}</div>

  return`<div class="ob-tabs-wrap" id="${wrapId}">
    <div class="ob-tab-bar">${tabsHtml}</div>
    ${panelsHtml}
  </div>`;
}

// ── ASSESSMENT TABLE ──────────────────────────────────────────────
function renderAssessmentTable(symbolic,sd){
  const results=symbolic.applicability_results||{};
  const rows=[];

  for(const iid of Object.keys(results)){
    const res=results[iid];
    const verdict=res.verdict||"cannot_determine";
    const scope=res.scope||{};
    const dUntil=res.deferred_until;
    const trace=res.trace||[];
    const inst=INST_SHORT[iid]||iid;

    rows.push(`<tr class="atbl-section-hdr"><td colspan="5">${INST_LABELS[iid]||iid}</td></tr>`);

    // Temporal
    const tempR=scope.temporal||"cannot_determine";
    const tempEntry=trace.find(e=>e.dimension==="temporal"&&e.result!=="not_reached");
    const tempEvidence=tempEntry?.evidence||"";
    let tempBadge,tempOutcome;
    if(tempR==="pass"){
      tempBadge=`<span class="atbl-badge ab-yes">✓ Satisfied</span>`;
      tempOutcome="In force — obligations active";
    } else if(tempR==="deferred"){
      tempBadge=`<span class="atbl-badge ab-def">⏳ Deferred${dUntil?" until "+fmtIsoDate(dUntil):""}`;
      tempOutcome=`Prepare now for ${dUntil?fmtIsoDate(dUntil):"obligation date"}.`;
    } else if(tempR==="fail"){
      tempBadge=`<span class="atbl-badge ab-no">✗ Not satisfied</span>`;
      tempOutcome="Regulation not yet in force for this category";
    } else {
      tempBadge=`<span class="atbl-badge ab-unk">– Unknown</span>`;
      tempOutcome="Provide deployment date";
    }
    const tempCites=(tempEntry?.citations||[]).slice(0,2).map(c=>`<span class="atbl-basis">${esc(c)}</span>`).join("");
    rows.push(`<tr>
      <td class="atbl-cat">Temporal scope<div class="atbl-sub">Date of application</div></td>
      <td class="atbl-assess">${tempBadge}</td>
      <td>${tempCites}</td>
      <td class="atbl-reason">${esc(tempEvidence.slice(0,120))}${tempEvidence.length>120?"…":""}</td>
      <td class="atbl-outcome">${esc(tempOutcome)}</td>
    </tr>`);

    // Territorial
    const terrR=scope.territorial||"cannot_determine";
    const terrEntry=trace.find(e=>e.dimension==="territorial"&&e.result==="pass")||trace.find(e=>e.dimension==="territorial");
    const terrBadge=terrR==="pass"?`<span class="atbl-badge ab-yes">✓ Satisfied</span>`:terrR==="fail"?`<span class="atbl-badge ab-no">✗ Not satisfied</span>`:`<span class="atbl-badge ab-unk">– Unknown</span>`;
    const terrCites=(terrEntry?.citations||[]).slice(0,2).map(c=>`<span class="atbl-basis">${esc(c)}</span>`).join("");
    rows.push(`<tr>
      <td class="atbl-cat">Territorial scope<div class="atbl-sub">Geographic reach</div></td>
      <td class="atbl-assess">${terrBadge}</td>
      <td>${terrCites}</td>
      <td class="atbl-reason">${esc((terrEntry?.evidence||"").slice(0,120))}</td>
      <td class="atbl-outcome">${terrR==="pass"?`${inst} applies regardless of provider location`:"No EU connection established"}</td>
    </tr>`);

    // Material
    const matR=scope.material||"cannot_determine";
    const matEntry=trace.find(e=>e.dimension==="material"&&e.predicate&&e.predicate.includes("risk_classification"))||trace.find(e=>e.dimension==="material"&&e.result==="pass");
    const risk=res.risk_category;
    const riskLabel=risk?({high_risk_annex_III:"High-risk (Annex III)",high_risk_annex_I_sector_products:"High-risk (Annex I)",GPAI_model:"GPAI model",prohibited:"PROHIBITED",limited_or_minimal_risk:"Limited risk"}[risk]||risk):"";
    const matBadge=matR==="pass"?`<span class="atbl-badge ab-yes">✓ ${riskLabel||"In scope"}</span>`:matR==="fail"?`<span class="atbl-badge ab-no">✗ Not in scope</span>`:`<span class="atbl-badge ab-unk">– Unknown</span>`;
    const matCites=(matEntry?.citations||[]).slice(0,2).map(c=>`<span class="atbl-basis">${esc(c)}</span>`).join("");
    rows.push(`<tr>
      <td class="atbl-cat">Material scope${riskLabel?`<div class="atbl-sub">${riskLabel}</div>`:"<div class='atbl-sub'>Subject-matter</div>"}</td>
      <td class="atbl-assess">${matBadge}</td>
      <td>${matCites}</td>
      <td class="atbl-reason">${esc((matEntry?.evidence||"").slice(0,120))}</td>
      <td class="atbl-outcome">${matR==="pass"?(risk?"Risk category confirmed — obligations apply":inst+" in scope"):"Does not meet material requirements"}</td>
    </tr>`);

    // AI Act: Art.5
    if(iid==="EU_AI_ACT"){
      const art5Entry=trace.find(e=>e.predicate&&e.predicate.includes("prohibited_practices_check"));
      if(art5Entry){
        const art5Cls=art5Entry.result==="pass"?"ab-pass":"ab-no";
        const art5Label=art5Entry.result==="pass"?"✓ Not prohibited":"⛔ PROHIBITED";
        rows.push(`<tr>
          <td class="atbl-cat">Prohibited practices<div class="atbl-sub">Art. 5 check</div></td>
          <td class="atbl-assess"><span class="atbl-badge ${art5Cls}">${art5Label}</span></td>
          <td><span class="atbl-basis">Art. 5 EU AI Act</span></td>
          <td class="atbl-reason">${art5Entry.result==="pass"?"No Art. 5 prohibited condition triggered":"A prohibited AI practice has been identified"}</td>
          <td class="atbl-outcome">${art5Entry.result==="pass"?"Proceed to risk classification":"Deployment not permitted under current design"}</td>
        </tr>`);
      }
    }

    // Overall verdict
    const verdictBadge={
      applies:         `<span class="atbl-badge ab-yes">✓ Applies</span>`,
      deferred:        `<span class="atbl-badge ab-def">⏳ Deferred${dUntil?" until "+fmtIsoDate(dUntil):""}</span>`,
      does_not_apply:  `<span class="atbl-badge ab-no">✗ Does not apply</span>`,
      cannot_determine:`<span class="atbl-badge ab-unk">– Cannot determine</span>`,
      prohibited:      `<span class="atbl-badge ab-no">⛔ Prohibited</span>`,
    }[verdict]||`<span class="atbl-badge ab-unk">${esc(verdict)}</span>`;
    const verdictOutcome={
      applies:        "Full compliance required",
      deferred:       `Prepare now — mandatory from ${dUntil?fmtIsoDate(dUntil):"obligation date"}`,
      does_not_apply: "No obligations at this time",
      cannot_determine:"Provide missing facts to determine",
      prohibited:     "Deployment not permitted",
    }[verdict]||"";
    rows.push(`<tr style="font-weight:600">
      <td class="atbl-cat">Overall verdict</td>
      <td class="atbl-assess" colspan="2">${verdictBadge}</td>
      <td class="atbl-reason" colspan="2">${esc(verdictOutcome)}</td>
    </tr>`);
  }

  if(!rows.length) return "";
  return`<div class="atbl-wrap">
    <table class="atbl">
      <colgroup>
        <col><col><col><col><col>
      </colgroup>
      <thead><tr>
        <th>Category</th><th>Assessment</th><th>Legal basis</th>
        <th>Reasoning</th><th>Outcome</th>
      </tr></thead>
      <tbody>${rows.join("")}</tbody>
    </table>
  </div>`;
}

// ── BUILD TRACE PANEL FOR ONE INSTRUMENT ─────────────────────────
function buildTracePanel(msgId,iid,res){
  const scope=res.scope||{};
  const trace=res.trace||[];
  const verdict=res.verdict||"cannot_determine";
  const dUntil=res.deferred_until;

  function dimBadge(r,label){
    if(r==="pass")     return`<span class="tdr-badge-ok">✓ ${label||"Satisfied"}</span>`;
    if(r==="deferred") return`<span class="tdr-badge-def">◷ ${label||"Deferred"}</span>`;
    if(r==="fail")     return`<span class="tdr-badge-no">✗ ${label||"Not satisfied"}</span>`;
    return`<span class="tdr-badge-unk">– ${label||"Unknown"}</span>`;
  }

  function traceFor(dim,predicateHint){
    return trace.find(e=>e.dimension===dim&&(!predicateHint||(e.predicate||"").includes(predicateHint)))
        ||trace.find(e=>e.dimension===dim&&e.result!=="not_reached");
  }

  let rows="";

  // Temporal
  const tempE=traceFor("temporal");
  const tempR=scope.temporal||"cannot_determine";

    <div class="tdr-badge">${dimBadge(tempR,tempBadgeLabel)}</div>
    <div class="tdr-detail">
      <div class="tdr-reason">${esc((tempE?.evidence||"").slice(0,220))}</div>

    <div class="tdr-badge">${dimBadge(terrR)}</div>
    <div class="tdr-detail">
      <div class="tdr-reason">${esc((terrE?.evidence||"").slice(0,220))}</div>
      <div class="tdr-cite">${(terrE?.citations||[]).slice(0,2).map(c=>esc(String(c))).join(" · ")}</div>
    </div>
  </div>`;

  // Material
  const matE=traceFor("material","is_ai_system")||traceFor("material","is_personal_data")||traceFor("material","manufacturer_claims")||traceFor("material");
  const matR=scope.material||"cannot_determine";
  const matLabel={EU_AI_ACT:"AI system (Art. 3(1))",GDPR:"Personal data (Art. 4(1))",MDR:"Medical device (Art. 2(1))"}[iid]||"Material scope";
  rows+=`<div class="trace-dim-row">
    <div class="tdr-dim"><div class="tdr-dim-name">${matLabel}</div><div class="tdr-dim-art">${{EU_AI_ACT:"Art. 3(1)",GDPR:"Art. 4(1), 9",MDR:"Art. 2(1)"}[iid]||""}</div></div>

      <div class="tdr-reason">${esc((matE?.evidence||"").slice(0,220))}</div>
      <div class="tdr-cite">${(matE?.citations||[]).slice(0,2).map(c=>esc(String(c))).join(" · ")}</div>
    </div>
  </div>`;

  // AI Act: risk classification & Art.5
  if(iid==="EU_AI_ACT"){
    const riskE=traceFor("material","risk_classification");
    if(riskE){
      const riskCat=res.risk_category||"";
      const RISK_LABELS={high_risk_annex_III:"High-risk · Annex III §5",high_risk_annex_I_sector_products:"High-risk · Annex I",GPAI_model:"GPAI model",prohibited:"Prohibited"};
      rows+=`<div class="trace-dim-row">
        <div class="tdr-dim"><div class="tdr-dim-name">Risk classification</div><div class="tdr-dim-art">Art. 6(2), Annex III</div></div>
        <div class="tdr-badge"><span class="tdr-badge-ok">${esc(RISK_LABELS[riskCat]||riskCat||"High-risk")}</span></div>
        <div class="tdr-detail">
          <div class="tdr-reason">${esc((riskE.evidence||"").slice(0,220))}</div>
          <div class="tdr-cite">${(riskE.citations||[]).slice(0,2).map(c=>esc(String(c))).join(" · ")}</div>
        </div>
      </div>`;
    }
    const art5E=trace.find(e=>(e.predicate||"").includes("prohibited_practices_check"));
    if(art5E){
      const art5Pass=art5E.result==="pass";
      rows+=`<div class="trace-dim-row">
        <div class="tdr-dim"><div class="tdr-dim-name">Art. 5 check</div><div class="tdr-dim-art">Prohibited practices</div></div>
        <div class="tdr-badge">${art5Pass?`<span class="tdr-badge-ok">✓ Not prohibited</span>`:`<span class="tdr-badge-no">⛔ Prohibited</span>`}</div>
        <div class="tdr-detail">
          <div class="tdr-reason">${art5Pass?"None of the Art. 5 prohibited conditions were triggered.":"A prohibited AI practice has been identified under Art. 5."}</div>
          <div class="tdr-cite">Art. 5 EU AI Act</div>
        </div>
      </div>`;
    }
  }

  // MDR: Rule 11
  if(iid==="MDR"){
    const rule11E=trace.find(e=>(e.predicate||"").toLowerCase().includes("rule_11"));
    if(rule11E){
      rows+=`<div class="trace-dim-row">
        <div class="tdr-dim"><div class="tdr-dim-name">Rule 11 — SaMD</div><div class="tdr-dim-art">Annex VIII</div></div>
        <div class="tdr-badge"><span class="tdr-badge-ok">Class IIa min.</span></div>
        <div class="tdr-detail">
          <div class="tdr-reason">${esc((rule11E.evidence||"").slice(0,220))}</div>
          <div class="tdr-cite">${(rule11E.citations||[]).slice(0,2).map(c=>esc(String(c))).join(" · ")}</div>
        </div>
      </div>`;
    }
  }

  // Overall
  const VERDICT_BADGE={
    applies:`<span class="tdr-badge-ok">✓ Appears to apply — on the facts provided</span>`,
    deferred:`<span class="tdr-badge-def">◷ In scope — obligations deferred until ${fmtIsoDate(dUntil)}</span>`,
    does_not_apply:`<span class="tdr-badge-no">✗ Does not appear to apply on these facts</span>`,
    cannot_determine:`<span class="tdr-badge-unk">– Cannot determine — see missing facts above</span>`,
    prohibited:`<span class="tdr-badge-no">⛔ Prohibited under Art. 5</span>`,
  }[verdict]||`<span class="tdr-badge-unk">${esc(verdict)}</span>`;

  let overallNote="This assessment depends on the accuracy and completeness of the information provided.";
  if(verdict==="deferred") overallNote="No immediate obligation arises on these facts.";
  if(verdict==="does_not_apply") overallNote="A different intended use, market location, or product type could change this conclusion.";

  return`<div class="reg-trace-panel" data-msg="${msgId}" data-iid="${iid}" style="display:none;">
    <div class="trace-panel-wrap">
      ${rows}
      <div class="trace-overall-row">
        ${VERDICT_BADGE}
        <span class="tor-note">${overallNote}</span>
      </div>
    </div>
  </div>`;
}

// ── REASONING TRACE ───────────────────────────────────────────────
function renderReasoningTrace(msgId, orderedIids, allRes){
  const cards = orderedIids.map((iid, idx) => {
    const res = allRes[iid] || {};
    const verdict = res.verdict || "cannot_determine";
    const scope = res.scope || {};
    const trace = res.trace || [];
    const dUntil = res.deferred_until;
    const openByDefault = idx === 0;

    // ── Verdict header badge ──
    const VBADGE = {
      applies:         `<span class="rt-verdict-pill rt-pill-yes">✓ Applies</span>`,
      deferred:        `<span class="rt-verdict-pill rt-pill-def">⏳ Deferred${dUntil ? " — " + fmtIsoDate(dUntil) : ""}</span>`,
      does_not_apply:  `<span class="rt-verdict-pill rt-pill-no">✗ Does not apply</span>`,
      cannot_determine:`<span class="rt-verdict-pill rt-pill-unk">– Uncertain</span>`,
      prohibited:      `<span class="rt-verdict-pill rt-pill-no">⛔ Prohibited</span>`,
    }[verdict] || `<span class="rt-verdict-pill rt-pill-unk">${esc(verdict)}</span>`;

    // ── Dimension rows ──
    function traceFor(dim, hint){
      return trace.find(e => e.dimension === dim && (!hint || (e.predicate||"").includes(hint)))
          || trace.find(e => e.dimension === dim && e.result !== "not_reached");
    }

    function dimRow(label, art, entryResult, entryEvidence, entryCites){
      const r = entryResult || "cannot_determine";
      const isMissing = r === "cannot_determine";
      const rowCls = r === "pass" ? "rt-row-pass"
                   : r === "deferred" ? "rt-row-def"
                   : r === "fail" ? "rt-row-fail"
                   : "rt-row-unk";
      const sym = r === "pass" ? "✓" : r === "deferred" ? "⏳" : r === "fail" ? "✗" : "?";
      const symCls = r === "pass" ? "rt-sym-pass" : r === "deferred" ? "rt-sym-def" : r === "fail" ? "rt-sym-fail" : "rt-sym-unk";
      const cites = (entryCites || []).slice(0, 2).map(c => `<span class="rt-cite">${esc(String(c))}</span>`).join("");
      const evidence = (entryEvidence || "").slice(0, 200);
      return `<div class="rt-dim-row ${rowCls}">
        <div class="rt-dim-left">
          <span class="rt-sym ${symCls}">${sym}</span>
          <div>
            <div class="rt-dim-name">${label}${art ? `<span class="rt-dim-art">${art}</span>` : ""}</div>
            ${evidence ? `<div class="rt-dim-ev">${esc(evidence)}${entryEvidence.length > 200 ? "…" : ""}</div>` : ""}
            ${cites ? `<div class="rt-dim-cites">${cites}</div>` : ""}
          </div>
        </div>
        ${isMissing ? `<span class="rt-missing-flag">⚠ Not disclosed</span>` : ""}
      </div>`;
    }

    // Build temporal row
    const tempE = traceFor("temporal");
    const tempRow = dimRow(
      "Temporal scope",
      iid === "EU_AI_ACT" ? "Art. 113" : iid === "MDR" ? "Art. 123(1)" : "Art. 99(2)",
      scope.temporal, tempE?.evidence || "", tempE?.citations
    );

    // Build territorial row
    const terrE = traceFor("territorial", "territorial_connector") || traceFor("territorial");
    const terrRow = dimRow(
      "Territorial scope",
      iid === "EU_AI_ACT" ? "Art. 2(1)" : iid === "MDR" ? "Art. 2(28)" : "Art. 3",
      scope.territorial, terrE?.evidence || "", terrE?.citations
    );

    // Build material row
    const matE = traceFor("material", "is_ai_system") || traceFor("material", "is_personal_data")
               || traceFor("material", "manufacturer_claims") || traceFor("material");
    const matLabel = {EU_AI_ACT: "AI system (Art. 3(1))", GDPR: "Personal data (Art. 4(1))", MDR: "Medical device (Art. 2(1))"}[iid] || "Material scope";
    const matArt = {EU_AI_ACT: "Art. 3(1)", GDPR: "Art. 4(1)", MDR: "Art. 2(1)"}[iid] || "";
    const matRow = dimRow(matLabel, matArt, scope.material, matE?.evidence || "", matE?.citations);

    // AI Act extras
    let extraRows = "";
    if(iid === "EU_AI_ACT"){
      const riskE = traceFor("material", "risk_classification");
      if(riskE && riskE.result !== "not_reached"){
        const riskCat = res.risk_category || "";
        const RISK_L = {high_risk_annex_III:"High-risk · Annex III §5", high_risk_annex_I_sector_products:"High-risk · Annex I", GPAI_model:"GPAI model", prohibited:"Prohibited"};
        extraRows += dimRow("Risk classification", "Art. 6(2), Annex III", riskE.result, riskE.evidence || (RISK_L[riskCat] || riskCat), riskE.citations);
      }
      const art5E = trace.find(e => (e.predicate||"").includes("prohibited_practices_check"));
      if(art5E){
        extraRows += dimRow("Art. 5 — Prohibited practices", "Art. 5", art5E.result,
          art5E.result === "pass" ? "No prohibited conditions triggered." : "A prohibited AI practice identified.", art5E.citations);
      }
    }
    if(iid === "MDR"){
      const r11E = trace.find(e => (e.predicate||"").toLowerCase().includes("rule_11"));
      if(r11E) extraRows += dimRow("Rule 11 — SaMD classification", "Annex VIII", r11E.result, r11E.evidence || "", r11E.citations);
    }

    // Count missing facts
    const missingCount = [scope.temporal, scope.territorial, scope.material]
      .filter(v => !v || v === "cannot_determine").length;

    const bodyId = `rt-body-${msgId}-${iid}`;
    const arrId  = `rt-arr-${msgId}-${iid}`;

    return `<div class="rt-reg-card">
      <div class="rt-reg-header" onclick="toggleRtCard('${bodyId}','${arrId}')">
        <div class="rt-reg-header-left">
          <span class="rt-reg-dot rt-dot-${iid === "GDPR" ? "gdpr" : iid === "EU_AI_ACT" ? "aia" : "mdr"}"></span>
          <span class="rt-reg-name">${esc(INST_LABELS[iid] || iid)}</span>
          ${VBADGE}
          ${missingCount > 0 ? `<span class="rt-missing-count">⚠ ${missingCount} fact${missingCount > 1 ? "s" : ""} not disclosed</span>` : ""}
        </div>
        <span class="rt-arr${openByDefault ? " open" : ""}" id="${arrId}">▾</span>
      </div>
      <div class="rt-reg-body${openByDefault ? " open" : ""}" id="${bodyId}">
        ${tempRow}${terrRow}${matRow}${extraRows}
        ${missingCount > 0 ? `<div class="rt-missing-banner">
          <span class="rt-missing-icon">⚠</span>
          <span class="rt-missing-text"><strong>${missingCount} dimension${missingCount > 1 ? "s" : ""} could not be assessed</strong> — the relevant facts were not disclosed or are ambiguous. To complete this analysis, provide the missing information above.</span>
        </div>` : ""}
      </div>
    </div>`;
  }).join("");

  return `<div class="rt-wrap">
    <div class="rt-header">
      <span class="rt-header-icon">≡</span>
      <span class="rt-header-label">Reasoning trace</span>
      <span class="rt-header-sub">${orderedIids.length} regulation${orderedIids.length > 1 ? "s" : ""} analysed</span>
    </div>
    ${cards}
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function renderComplianceResponse(data,msgId){
  // Bare answer (no narrative envelope)
  if(data.answer&&!data.narrative)
    return`<div class="vbub v-info"><div class="verdict-line">${fmt(data.answer)}</div></div>${renderSources(data.sources)}`;

  const n=data.narrative||{};
  const sym=data.symbolic||{};
  const vtype=n.verdict_type||"cannot_determine";
  const vline=n.verdict_line||"";
  const full=n.full_analysis||"";

  // Stage-based layouts (early return)
  if(vtype==="indicative")  return renderIndicative(n);
  if(vtype==="gathering")   return renderGathering(n);
  if(vtype==="preliminary") return renderPreliminary(n);

  // General / context_update → clean LLM answer, no symbolic card
  if(vtype==="general"||vtype==="context_update"){
    const cleanFull = sanitizeAnalysis(full);
    const hasContent = cleanFull && cleanFull.trim().length > 0;
    return`<div class="vbub ${vbubCls(vtype)}">
      ${vbadge(vtype)}
      <div class="verdict-line">${fmt(vline)}</div>
      ${hasContent ? `<div class="full-a">${fmtRich(cleanFull)}</div>` : ""}
    </div>${renderSources(data.sources||[])}`;
  }

  // ── Applicability verdict layout ──────────────────────────────────
  const allRes=sym.applicability_results||{};
  const iids=Object.keys(allRes);
  const INST_ORDER=["GDPR","EU_AI_ACT","MDR"];
  const orderedIids=[...INST_ORDER.filter(i=>iids.includes(i)),...iids.filter(i=>!INST_ORDER.includes(i))];

  const vcCls={applies:"v-yes",does_not_apply:"v-no",cannot_determine:"v-unk",deferred:"v-def",prohibited:"v-no"}[vtype]||"v-info";

  // EUR-Lex links from legal_basis_cards
  const cards=n.legal_basis_cards||[];
  const EURLEX_DEFAULTS={
    GDPR:      {label:"GDPR — Reg. (EU) 2016/679",       url:"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32016R0679"},
    EU_AI_ACT: {label:"EU AI Act — Reg. (EU) 2024/1689", url:"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=OJ:L_202401689"},
    MDR:       {label:"MDR — Reg. (EU) 2017/745",         url:"https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:32017R0745"},
  };
  const lexLinks=[];
  cards.forEach(c=>{
    const url=c.eurlex_url||(EURLEX_DEFAULTS[c.instrument_id]?.url||"");
    const art=c.eurlex_article||"";
    const label=(c.instrument_short||c.instrument_id)+(art?" · "+art:"");
    if(url) lexLinks.push({url,label});
  });
  orderedIids.forEach(iid=>{
    if(!cards.find(c=>c.instrument_id===iid)&&EURLEX_DEFAULTS[iid])
      lexLinks.push(EURLEX_DEFAULTS[iid]);
  });
  const lexHtml=lexLinks.length
    ?`<div class="vc-lex">${lexLinks.map(l=>`<a class="vc-lex-link" href="${esc(l.url)}" target="_blank">${esc(l.label)} ↗</a>`).join("")}</div>`:"";

  // Summary text (first paragraph only, clean)
  const summaryText = fmt(sanitizeAnalysis(full).split(/\n\n+/)[0]||"");

  // Next steps section
  const nextSteps=n.next_steps||[];
  let nsSec="";
  if(nextSteps.length){
    const TIMING_CLS=t=>{
      if(!t) return"st-ongoing";
      const tl=t.toLowerCase();
      return tl.includes("immediate")?"st-immediate":tl.includes("before")||/\d{4}/.test(t)?"st-before":"st-ongoing";
    };
    const stepRows=nextSteps.map((s,i)=>`<div class="step-row">
      <div class="step-num">${i+1}</div>
      <div><div class="step-action">${fmt(s.action||"")}</div><div class="step-basis">${esc(s.basis||"")}</div></div>
      <div class="step-timing ${TIMING_CLS(s.timing)}">${esc(s.timing||"Ongoing")}</div>
    </div>`).join("");
    nsSec=`<div>
      <div class="sec-toggle" onclick="toggleSec('ns-${msgId}')">
        <span class="sec-lbl"><span class="sec-pip pip-blue"></span>Next steps · ${nextSteps.length}</span>
        <span class="sec-right"><span class="sec-arr" id="arr-ns-${msgId}">▾</span></span>
      </div>
      <div id="sec-ns-${msgId}" class="sec-body">
        <div class="rcard"><div class="rcard-body">${stepRows}</div></div>
      </div>
    </div>`;
  }

  return`
    <div class="verdict-card ${vcCls}">
      ${vbadge(vtype)}
      <div class="vc-verdict-line">${fmt(vline)}</div>
      ${summaryText ? `<div class="vc-analysis">${summaryText}</div>` : ""}
      ${lexHtml}
    </div>
    ${orderedIids.length ? renderReasoningTrace(msgId, orderedIids, allRes) : ""}
    ${renderFollowUpCard()}
    ${renderSources(data.sources||[])}
  `;
}

// ── SEND ──────────────────────────────────────────────────────────
async function send(){
  const inp=document.getElementById("cin"),text=inp.value.trim();
  if(!text||loading) return;
  inp.value="";inp.style.height="auto";loading=true;document.getElementById("sbtn").disabled=true;
  document.getElementById("welcome")?.remove();
  msgs.push({role:"user",content:text,id:nid()});msgCount++;renderMsgs();
  const url=extractUrl(text);
  if(url){
    const lid=nid();msgs.push({type:"loading",id:lid,status:"Fetching product profile…"});renderMsgs();
    try{
      const d=await analyzeUrl(url);
      msgs=msgs.filter(m=>m.id!==lid);
      msgs.push({role:"assistant",type:"response",id:nid(),data:{narrative:{verdict_type:"general",verdict_line:`Product profile loaded: ${d.profile||"Profile generated."}`,full_analysis:"",legal_basis_cards:[],suggested_actions:[],next_steps:[]},symbolic:{},scope_display:{},company_context:null,sources:[]}});
      renderMsgs();
    }catch(e){msgs=msgs.filter(m=>m.id!==lid);}
  }
  const lid=nid();msgs.push({type:"loading",id:lid,status:"Running symbolic engine…"});renderMsgs();
  try{
    const data=normalizeBackendResponse(await callBackend(text));
    msgs=msgs.filter(m=>m.id!==lid);
    msgs.push({role:"assistant",type:"response",id:nid(),data});
    const n=data.narrative||{};
    addSession(n.session_title||text.slice(0,35),text.slice(0,50));
    updateHdr(n.session_title||text.slice(0,35));
    renderMsgs();
    renderActs(n.suggested_actions||[]);
  }catch(err){
    msgs=msgs.filter(m=>m.id!==lid);
    msgs.push({role:"assistant",type:"response",id:nid(),data:{narrative:{verdict_type:"cannot_determine",verdict_line:`Could not reach backend: ${err.message}`,full_analysis:`Ensure backend is running at ${BACKEND}`,legal_basis_cards:[],suggested_actions:[],next_steps:[]},symbolic:{},scope_display:{},company_context:null,sources:[]}});
    renderMsgs();
  }
  loading=false;document.getElementById("sbtn").disabled=false;
}

function editCtx(){
  const co=prompt("Company name:",document.getElementById("ctx-co").textContent);if(co)document.getElementById("ctx-co").textContent=co;
  const mkt=prompt("Markets:",document.getElementById("ctx-mkt").textContent);if(mkt)document.getElementById("ctx-mkt").textContent=mkt;
  const name=prompt("Your name:",document.getElementById("user-name").textContent);
  if(name){document.getElementById("user-name").textContent=name;document.getElementById("user-av").textContent=name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
}

renderSessions();renderMsgs();
</script>
